
        <!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>杀号预测模型 · 负一维反向因果</title>
<style>
:root{--bg:#f7f9fc;--card:#ffffff;--text:#1f2937;--muted:#6b7280;--primary:#2563eb;--primary-weak:#e6efff;--border:#e5e7eb;--success:#16a34a;--danger:#ef4444;--warning:#ca8a04;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans SC","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;touch-action:pan-y;-webkit-user-select:none;user-select:none;}
.container{max-width:980px;margin:0 auto;padding:0;}
.card{background:var(--card);border:1px solid var(--border);border-radius:0;box-shadow:0 8px 20px rgb(16 24 40 / 6%);padding:16px;margin-bottom:1px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.logo{font-weight:700;font-size:18px;color:var(--primary);}
.small{color:var(--muted);font-size:12px}
.current{display:grid;grid-template-columns:1fr;gap:8px;text-align:center;}
.current .period{font-weight:700;font-size:20px}
.current .nums{font-size:24px;font-weight:700}
.current .badge{display:inline-block;background:var(--primary-weak);color:var(--primary);padding:4px 12px;border-radius:999px;font-weight:700;margin-left:8px;font-size:16px;}
.current .opentime{font-size:16px;color:var(--muted);}
.countdown{margin-top:4px;font-size:16px;color:var(--muted)}
.countdown.highlight{color:var(--danger);font-weight:700}
.ai.card{margin-top:1px}
.ai-title{font-weight:700;margin-bottom:6px;font-size:18px;}
.ai-line{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.ai-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;border:1px solid var(--border);font-weight:600;background:#f9fafb;font-size:16px;}
.ai-pill.success{background:#ecfdf5;border-color:#bbf7d0;color:#065f46}
.ai-pill.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
.ai-pill.info{background:#e6efff;border-color:#bfdbfe;color:#1e40af}
.error{color:#111;padding:10px 0;font-size:16px;}
.prediction-table{margin-top:16px;width:100%;border-collapse:collapse;font-size:16px;}
.prediction-table th{background:var(--primary-weak);color:var(--primary);padding:10px 12px;text-align:center;font-weight:600;border:1px solid var(--border);}
.prediction-table td{padding:8px 10px;text-align:center;border:1px solid var(--border);}
.prediction-table .correct{color:var(--success);font-weight:600;}
.prediction-table .wrong{color:var(--danger);font-weight:600;}
.prediction-table .defense{color:var(--warning);font-weight:600;}
.table-title{font-weight:700;margin:20px 0 10px 0;font-size:18px;}
.stats{margin-top:12px;padding:10px;background:var(--primary-weak);border-radius:8px;text-align:center;font-weight:600;color:var(--primary);font-size:16px;}
.algorithm-selector{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;}
.algorithm-btn{padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-weight:500;transition:all 0.2s;font-size:14px;flex:1 0 23%;max-width:23%;text-align:center;}
.algorithm-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
.monitor-section{margin-top:16px;padding:12px;background:var(--primary-weak);border-radius:8px;}
.monitor-title{font-weight:700;margin-bottom:8px;color:var(--primary);font-size:16px;}
.monitor-content{font-size:14px;line-height:1.5;}
@media (max-width:768px){.card{padding:12px;}.current .nums{font-size:20px;}.algorithm-selector{gap:6px;}.algorithm-btn{padding:8px 10px;font-size:12px;flex:1 0 23%;max-width:23%;}.prediction-table{font-size:14px;}}
</style>
</head>
<body>
<div class="container">
<div id="error" class="error" style="display:none;"></div>
<div class="card">
<div class="header"><div class="logo">🌀 负一维·反向因果</div><div class="small">超光速倒流</div></div>
<div class="current">
<div class="period">最新：<span id="cur-period">--</span> 期</div>
<div class="nums"><span id="cur-nums">--+--+--=--</span><span id="cur-tag" class="badge">-- --</span></div>
<div class="opentime">开奖时间：<span id="cur-time">-- --:--:--</span></div>
<div id="cd" class="countdown" style="display:none;">下一期：<span id="cd-txt">--分--秒</span></div>
</div>
</div>
<div id="ai" class="ai card" style="display:none;">
<div class="ai-title">⚡ 负一维反向因果 · 未来已定</div>
<div class="ai-line">
<span id="ai-nextperiod" class="ai-pill warn">预测期数：--</span>
<span id="ai-predict-combo" class="ai-pill success">杀号结果：--</span>
<span id="ai-recommend-combo" class="ai-pill info">推荐组合：--</span>
<span id="ai-defense-combo" class="ai-pill info">防守组合：--</span>
</div>
<div class="monitor-section">
<div class="monitor-title">📡 模型性能（反向验证）</div>
<div id="highest-winrate" class="monitor-content">当前准确率：--</div>
<div id="most-consecutive" class="monitor-content">当前连中：--</div>
</div>
</div>
<div class="card" id="prediction-table-card" style="display:none;">
<div class="table-title">📋 历史反向回测</div>
<div id="stats" class="stats"></div>
<table class="prediction-table">
<thead><tr><th>期号</th><th>开奖</th><th>推荐组合</th><th>防守组合</th><th>命中情况</th></tr></thead>
<tbody id="prediction-tbody"></tbody>
</table>
</div>
</div>
<script>
document.addEventListener('touchstart',function(event){if(event.touches.length>1)event.preventDefault();});
let lastTouchEnd=0;document.addEventListener('touchend',function(event){const now=(new Date()).getTime();if(now-lastTouchEnd<=300)event.preventDefault();lastTouchEnd=now;},false);
document.addEventListener('gesturestart',function(e){e.preventDefault();});document.addEventListener('gesturechange',function(e){e.preventDefault();});document.addEventListener('gestureend',function(e){e.preventDefault();});
const fieldConfig={periodField:'expect',numbersField:'opencode',timeField:'opentime',separator:',',apiUrl:'https://super.pc28998.com/history/JND28?limit=100'};
let data=[],nextTime=null,timer=null,isFetching=false;let currentAlgorithm='0';let algorithmStats={};
document.addEventListener('DOMContentLoaded',init);
function init(){initializeAlgorithmStats();fetchData();}
function initializeAlgorithmStats(){algorithmStats={total:0,win:0,currentConsecutive:0,winRate:0};}
function setError(msg){const el=document.getElementById('error');el.textContent=msg;el.style.display='block';}function clearError(){document.getElementById('error').style.display='none';}
function fetchData(){if(isFetching)return;isFetching=true;clearError();fetch(fieldConfig.apiUrl,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(json=>{data=extractArray(json).slice(0,100).map(item=>({...item,nums:parseNums(item[fieldConfig.numbersField])}));if(!data.length)throw new Error('没有获取到开奖数据');renderCurrent();setupCountdown();renderAIPredict();calculateAllAlgorithmsStats();updateAlgorithmMonitor();renderPredictionTable();isFetching=false;}).catch(e=>{console.error(e);setError('获取数据出错：'+e.message);isFetching=false;});}
function extractArray(res){if(Array.isArray(res))return res;if(res&&typeof res==='object'){const keys=['data','items','list','results','records'];for(const k of keys){if(Array.isArray(res[k]))return res[k];}for(const k in res){if(Array.isArray(res[k]))return res[k];}}return[];}
function parseNums(opennum){if(!opennum)return[];return String(opennum).split(fieldConfig.separator).map(s=>s.trim()).filter(Boolean).map(n=>parseInt(n,10)||0);}
function sum(nums){return nums.reduce((a,b)=>a+b,0);}
function tagBySum(total){const size=total>=14?'大':'小';const oe=(total%2===0)?'双':'单';return{size,oe,combo:size+oe};}
function fmtTime(s){try{if(typeof s==='string'&&s.includes('-')&&s.includes(':')){const now=new Date();const[md,hms]=s.split(' ');const[M,D]=md.split('-').map(Number);const[hh,mm,ss]=hms.split(':').map(Number);const pad=n=>String(n).padStart(2,'0');return`${pad(M)}-${pad(D)} ${pad(hh)}:${pad(mm)}:${pad(ss)}`;}const ts=Number(s);if(!Number.isNaN(ts)){const d=new Date(ts>1e12?ts:ts*1000);const pad=n=>String(n).padStart(2,'0');return`${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;}}catch(e){}return'-- --:--:--';}
function renderCurrent(){const latest=data[0];const period=latest[fieldConfig.periodField]??'--';const nums=latest.nums||[];const s=sum(nums);const t=tagBySum(s);const numsTxt=(nums.length?nums.join('+')+'='+s:'--+--+--=--');const openTime=fmtTime(latest[fieldConfig.timeField]);document.getElementById('cur-period').textContent=period;document.getElementById('cur-nums').textContent=numsTxt;document.getElementById('cur-tag').textContent=t.combo;document.getElementById('cur-time').textContent=openTime;}
function setupCountdown(){if(timer)clearInterval(timer);const latest=data[0];const ts=latest[fieldConfig.timeField];let t=null;try{if(typeof ts==='string'&&ts.includes('-')&&ts.includes(':')){const now=new Date();const[md,hms]=ts.split(' ');const[M,D]=md.split('-').map(Number);const[hh,mm,ss]=hms.split(':').map(Number);t=new Date(now.getFullYear(),M-1,D,hh,mm,ss);}else{const n=Number(ts);t=new Date(n>1e12?n:n*1000);}}catch(e){}if(!t){document.getElementById('cd').style.display='none';return;}nextTime=new Date(t.getTime()+3*60*1000+30*1000);document.getElementById('cd').style.display='block';tick();timer=setInterval(tick,1000);}
function tick(){const now=new Date();const diff=nextTime-now;const el=document.getElementById('cd');const txt=document.getElementById('cd-txt');if(diff<=0){clearInterval(timer);txt.textContent='正在开奖...';el.classList.add('highlight');if(!isFetching){setTimeout(fetchData,1500);}return;}const m=Math.floor(diff/60000);const s=Math.floor((diff%60000)/1000);txt.textContent=`${m}分${String(s).padStart(2,'0')}秒`;if(diff<30000)el.classList.add('highlight');else el.classList.remove('highlight');}

// ==================== 负一维超光速反向因果模型 (替换原算法) ====================
function calculateReverseCausalityModel(dataSlice) {
    // 需要至少10期数据做反向冷却/冷号判断
    if (!dataSlice || dataSlice.length < 10) return null;
    
    // 反向取最后10期（按时间倒序，索引0是最近一期）
    const last10 = dataSlice.slice(0, 10);
    
    // 1. 反向因果能量初始化 (小单,大双,小双,大单)
    let energy = { '小单':0, '大双':0, '小双':0, '大单':0 };
    
    // 2. 冷号指数: 百位6(遗漏34期模拟),个位4(遗漏33期) —— 从最近一期往前找真实遗漏
    let missingBai6 = 0, missingGe4 = 0;
    let foundBai6 = false, foundGe4 = false;
    for (let i = 0; i < data.length; i++) {  // 全局data查找真实遗漏
        const item = data[i];
        if (!item.nums || item.nums.length<3) continue;
        const bai = item.nums[0];
        const ge = item.nums[2];
        if (!foundBai6 && bai === 6) { foundBai6 = true; missingBai6 = i; } // i是遗漏期数(因为最近期索引0)
        if (!foundGe4 && ge === 4) { foundGe4 = true; missingGe4 = i; }
        if (foundBai6 && foundGe4) break;
    }
    // 如果从未出现，用较大值模拟
    if (!foundBai6) missingBai6 = 40;
    if (!foundGe4) missingGe4 = 40;
    
    // 3. 反向直觉: 小单未来连续, 大双反弹, 小双需冷却, 大单过热
    // 最近5期实际开奖组合 (反向顺序)
    const recent5Combos = last10.slice(0,5).map(item => tagBySum(sum(item.nums)).combo);
    // 计数
    let cntSmallSingle = recent5Combos.filter(c => c === '小单').length;
    let cntBigDouble = recent5Combos.filter(c => c === '大双').length;
    let cntSmallDouble = recent5Combos.filter(c => c === '小双').length;
    let cntBigSingle = recent5Combos.filter(c => c === '大单').length;
    
    // 能量分配 (基于反向因果描述)
    // 小单: 未来将连续出现 (+5 基础)
    energy['小单'] = 100 + cntSmallSingle * 8 + (missingBai6 > 30 ? 12 : 0) + (missingGe4 > 30 ? 8 : 0);
    // 大双: 未来将反弹 (+3 基础，如果近期出现少则能量更高)
    energy['大双'] = 95 + (cntBigDouble === 0 ? 15 : 0) + (5 - cntBigDouble) * 4;
    // 小双: 刚刚出现(最近一期是不是小双？) 冷却
    const lastCombo = recent5Combos[0] || '';
    if (lastCombo === '小双') {
        energy['小双'] = 70;  // 冷却
    } else {
        energy['小双'] = 88 - cntSmallDouble * 6;
    }
    // 大单: 过热 (削减)
    energy['大单'] = 80 - cntBigSingle * 10;
    
    // 确保能量不低于0
    Object.keys(energy).forEach(k => energy[k] = Math.max(20, Math.min(120, energy[k])));
    
    // 4. 根据能量选择杀组: 杀能量最低的组合
    let sorted = Object.entries(energy).sort((a,b) => a[1] - b[1]); // 升序
    let killCombo = sorted[0][0];  // 能量最低的杀掉
    let killResult = `杀${killCombo}`;
    
    // 5. 推荐组合 & 防守组合 (根据杀组决定)
    let recommendCombo = '', defenseCombo = '';
    if (killCombo === '大单') {
        recommendCombo = '大双+小单';
        defenseCombo = '小双';
    } else if (killCombo === '小双') {
        recommendCombo = '小单+大双';
        defenseCombo = '大单';
    } else if (killCombo === '大双') {
        recommendCombo = '大单+小双';
        defenseCombo = '小单';
    } else if (killCombo === '小单') {
        recommendCombo = '小双+大单';
        defenseCombo = '大双';
    }
    
    // 6. 特码推荐 (硬编码基于反向王炸：13,15,16,9)
    const specialSumHint = '13,15,16,9';
    
    // 额外直选冷号预警
    const coldAlert = (missingBai6 > 30 ? `百位6遗漏${missingBai6}期❗` : '') + 
                      (missingGe4 > 30 ? ` 个位4遗漏${missingGe4}期❗` : '');
    
    return {
        predictionCombo: `杀号：${killCombo}`,
        size: killCombo.includes('大') ? '大' : '小',
        oe: killCombo.includes('双') ? '双' : '单',
        killResult: killResult,
        recommendCombo: recommendCombo,
        defenseCombo: defenseCombo,
        specialSumHint: specialSumHint,
        coldAlert: coldAlert.trim(),
        energyScores: energy
    };
}

// 渲染AI预测条 (使用负一维模型)
function renderAIPredict() {
    try {
        if (!data.length || data.length < 10) {
            document.getElementById('ai').style.display = 'none';
            return;
        }
        const result = calculateReverseCausalityModel(data);  // 传入全部数据，内部取前10
        if (result) {
            document.getElementById('ai-predict-combo').textContent = result.predictionCombo;
            document.getElementById('ai-recommend-combo').textContent = `推荐：${result.recommendCombo}`;
            document.getElementById('ai-defense-combo').textContent = `防守：${result.defenseCombo}`;
            document.getElementById('ai-recommend-combo').style.display = 'inline-flex';
            document.getElementById('ai-defense-combo').style.display = 'inline-flex';
            // 可将特码提示加到某个位置，此处加在防守后作为tooltip，也可以忽略
        } else {
            document.getElementById('ai-predict-combo').textContent = '杀号：数据不足';
            document.getElementById('ai-recommend-combo').style.display = 'none';
            document.getElementById('ai-defense-combo').style.display = 'none';
        }
        const nextPeriod = (() => {
            const cur = data[0][fieldConfig.periodField];
            const n = Number(cur);
            if (Number.isFinite(n)) return String(n + 1);
            const m = String(cur || '').match(/(\d+)(?!.*\d)/);
            return m ? String(Number(m[1]) + 1) : '--';
        })();
        document.getElementById('ai-nextperiod').textContent = `预测期数：${nextPeriod}`;
        document.getElementById('ai').style.display = 'block';
    } catch(e) {
        console.error('预测计算错误:', e);
    }
}

// 计算历史准确率与连中 (基于反向因果模型)
function calculateAllAlgorithmsStats() {
    const testPeriods = Math.min(data.length - 10, 40); // 需要至少10期
    let total = 0, win = 0;
    let currentConsecutive = 0;
    
    // 从最新一期(i=0)开始回测，但需要其前10期数据做预测
    for (let i = 0; i < testPeriods; i++) {
        if (i + 10 >= data.length) continue;
        // 预测所用数据: 从 i+1 到 i+10 (共10期) 来预测第 i 期
        const predictionWindow = data.slice(i + 1, i + 11);
        if (predictionWindow.length < 10) continue;
        const result = calculateReverseCausalityModel(predictionWindow);
        if (!result) continue;
        
        const actualNums = data[i].nums || [];
        const actualSum = sum(actualNums);
        const actualTag = tagBySum(actualSum);
        const killTarget = result.killResult.replace('杀', ''); // 被杀的组合
        
        // 杀组正确：开奖结果不等于被杀组合
        const isCorrect = (actualTag.combo !== killTarget);
        total++;
        if (isCorrect) win++;
    }
    
    // 连中计算：从最新一期开始往历史找连续杀对
    let consecutive = 0;
    for (let i = 0; i < testPeriods; i++) {
        if (i + 10 >= data.length) break;
        const predictionWindow = data.slice(i + 1, i + 11);
        if (predictionWindow.length < 10) continue;
        const result = calculateReverseCausalityModel(predictionWindow);
        if (!result) continue;
        const actualNums = data[i].nums || [];
        const actualSum = sum(actualNums);
        const actualTag = tagBySum(actualSum);
        const killTarget = result.killResult.replace('杀', '');
        if (actualTag.combo !== killTarget) {
            consecutive++;
        } else {
            break;
        }
    }
    
    algorithmStats.total = total;
    algorithmStats.win = win;
    algorithmStats.currentConsecutive = consecutive;
    algorithmStats.winRate = total > 0 ? (win / total) * 100 : 0;
}

function updateAlgorithmMonitor() {
    const highestWinrateEl = document.getElementById('highest-winrate');
    const mostConsecutiveEl = document.getElementById('most-consecutive');
    if (algorithmStats.total > 0) {
        highestWinrateEl.textContent = `当前准确率：${algorithmStats.win}/${algorithmStats.total}=${algorithmStats.winRate.toFixed(1)}%`;
        mostConsecutiveEl.textContent = `当前连中：${algorithmStats.currentConsecutive}期`;
    } else {
        highestWinrateEl.textContent = '当前准确率：--';
        mostConsecutiveEl.textContent = '当前连中：--';
    }
}

// 渲染历史回测表格
function renderPredictionTable() {
    if (data.length < 11) {
        document.getElementById('prediction-table-card').style.display = 'none';
        return;
    }
    const tbody = document.getElementById('prediction-tbody');
    tbody.innerHTML = '';
    const displayCount = Math.min(data.length - 10, 30); // 展示最多30期
    let winCount = 0, totalCount = 0;
    
    for (let i = 0; i < displayCount; i++) {
        if (i + 10 >= data.length) continue;
        const predictionWindow = data.slice(i + 1, i + 11);
        if (predictionWindow.length < 10) continue;
        const result = calculateReverseCausalityModel(predictionWindow);
        if (!result) continue;
        
        const currentData = data[i];
        const actualNums = currentData.nums || [];
        const actualSum = sum(actualNums);
        const actualTag = tagBySum(actualSum);
        const killTarget = result.killResult.replace('杀', '');
        
        let hitResult = '', cssClass = '';
        if (actualTag.combo === killTarget) {
            hitResult = '杀组错误';
            cssClass = 'wrong';
        } else {
            // 检查是否命中推荐或防守
            const recommendParts = result.recommendCombo.split('+');
            const defenseParts = result.defenseCombo.split('+');
            if (recommendParts.includes(actualTag.combo)) {
                hitResult = '中推荐';
                cssClass = 'correct';
            } else if (defenseParts.includes(actualTag.combo)) {
                hitResult = '中防守';
                cssClass = 'defense';
            } else {
                hitResult = '未命中';
                cssClass = '';
            }
        }
        
        if (hitResult !== '杀组错误') winCount++;
        totalCount++;
        
        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${currentData[fieldConfig.periodField] || '--'}</td>
            <td>${actualNums.length ? actualNums.join('+') + '=' + actualSum : '--'}</td>
            <td>${result.recommendCombo}</td>
            <td>${result.defenseCombo}</td>
            <td class="${cssClass}">${hitResult}</td>
        `;
        tbody.appendChild(row);
    }
    
    if (totalCount > 0) {
        const winRate = ((winCount / totalCount) * 100).toFixed(1);
        document.getElementById('stats').textContent = `杀号模型胜率：${winCount}/${totalCount}=${winRate}%`;
    }
    document.getElementById('prediction-table-card').style.display = 'block';
}

</script>
