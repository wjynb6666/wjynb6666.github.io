<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>杀号预测模型 · 至尊预测</title>
<style>
:root{--bg:#f7f9fc;--card:#ffffff;--text:#1f2937;--muted:#6b7280;--primary:#2563eb;--primary-weak:#e6efff;--border:#e5e7eb;--success:#16a34a;--danger:#ef4444;--warning:#ca8a04;--purple:#7c3aed;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans SC","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;touch-action:pan-y;-webkit-user-select:none;user-select:none;}
.container{max-width:1200px;margin:0 auto;padding:0;}
.card{background:var(--card);border:1px solid var(--border);border-radius:0;box-shadow:0 8px 20px rgb(16 24 40 / 6%);padding:16px;margin-bottom:1px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.logo{font-weight:700;font-size:18px;color:var(--primary);}
.small{color:var(--muted);font-size:12px}
.current{display:grid;grid-template-columns:1fr;gap:8px;text-align:center;}
.current .period{font-weight:700;font-size:20px}
.current .nums{font-size:24px;font-weight:700}
.current .badge{display:inline-block;background:var(--primary-weak);color:var(--primary);padding:4px 12px;border-radius:999px;font-weight:700;margin-left:8px;font-size:16px;}
.current .opentime{font-size:16px;color:var(--muted);}
.countdown{margin-top:4px;font-size:16px;color:var(--muted)}
.countdown.highlight{color:var(--danger);font-weight:700}
.ai.card{margin-top:1px}
.ai-title{font-weight:700;margin-bottom:6px;font-size:18px;}
.ai-line{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.ai-pill{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);font-weight:600;background:#f9fafb;font-size:14px;}
.ai-pill.success{background:#ecfdf5;border-color:#bbf7d0;color:#065f46}
.ai-pill.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
.ai-pill.info{background:#e6efff;border-color:#bfdbfe;color:#1e40af}
.ai-pill.danger{background:#fee2e2;border-color:#fecaca;color:#b91c1c}
.ai-pill.purple{background:#f3e8ff;border-color:#d8b4fe;color:#6b21a8}
.error{color:#111;padding:10px 0;font-size:16px;}
.prediction-table{margin-top:16px;width:100%;border-collapse:collapse;font-size:13px; table-layout:fixed;}
.prediction-table th{background:var(--primary-weak);color:var(--primary);padding:8px 3px;text-align:center;font-weight:600;border:1px solid var(--border); word-break:break-word;}
.prediction-table td{padding:5px 3px;text-align:center;border:1px solid var(--border); word-break:break-word;}
.prediction-table .correct{color:var(--success);font-weight:600;}
.prediction-table .wrong{color:var(--danger);font-weight:600;}
.table-title{font-weight:700;margin:20px 0 10px 0;font-size:18px;}
.stats{margin-top:12px;padding:10px;background:var(--primary-weak);border-radius:8px;text-align:center;font-weight:600;color:var(--primary);font-size:14px;}
.monitor-section{margin-top:16px;padding:12px;background:var(--primary-weak);border-radius:8px;}
.monitor-title{font-weight:700;margin-bottom:8px;color:var(--primary);font-size:16px;}
.monitor-content{font-size:13px;line-height:1.5;}
.single-group-box{margin-top:12px;padding:10px;background:linear-gradient(145deg, #fef3c7 0%, #fde68a 100%);border-radius:12px;border-left:6px solid #ca8a04;}
.single-group-title{font-weight:800;margin-bottom:6px;color:#78350f;font-size:15px;}
.single-group-content{font-size:15px;font-weight:700;color:#451a03;}
.algorithm-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;margin-left:5px;}
.table-wrapper{overflow-x:auto; -webkit-overflow-scrolling:touch;}
.kill-group-box{background:#fff1f0;border:1px solid #ffccc7;border-radius:12px;padding:10px;margin:10px 0;}
@media (max-width:768px){.card{padding:10px;}.current .nums{font-size:18px;}.prediction-table{font-size:11px;}.ai-pill{font-size:12px;padding:4px 8px;}}
</style>

<body>
<div class="container">

<!-- 算法融合详情 -->

</div>

<!-- 单组预测 -->
<div class="single-group-box">

<div id="stats" class="stats"></div>
<div class="table-wrapper">
<table class="prediction-table">
<thead><tr><th>期号</th><th>开奖</th><th>杀号</th><th>杀组</th><th>推荐</th><th>防守</th><th>单组</th><th>特码</th><th>杀中</th><th>特中</th><th>单中</th></tr></thead>
<tbody id="prediction-tbody"></tbody>

<script>
document.addEventListener('touchstart',function(event){if(event.touches.length>1)event.preventDefault();});
let lastTouchEnd=0;document.addEventListener('touchend',function(event){const now=(new Date()).getTime();if(now-lastTouchEnd<=300)event.preventDefault();lastTouchEnd=now;},false);
document.addEventListener('gesturestart',function(e){e.preventDefault();});document.addEventListener('gesturechange',function(e){e.preventDefault();});document.addEventListener('gestureend',function(e){e.preventDefault();});
const fieldConfig={periodField:'expect',numbersField:'opencode',timeField:'opentime',separator:',',apiUrl:'https://super.pc28998.com/history/JND28?limit=100'};
let data=[],nextTime=null,timer=null,isFetching=false;let algorithmStats={};
document.addEventListener('DOMContentLoaded',init);
function init(){initializeAlgorithmStats();fetchData();}
function initializeAlgorithmStats(){algorithmStats={total:0,win:0,currentConsecutive:0,winRate:0,specialWin:0,singleWin:0,killGroupWin:0};}
function setError(msg){const el=document.getElementById('error');el.textContent=msg;el.style.display='block';}function clearError(){document.getElementById('error').style.display='none';}
function fetchData(){if(isFetching)return;isFetching=true;clearError();fetch(fieldConfig.apiUrl,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(json=>{data=extractArray(json).slice(0,100).map(item=>({...item,nums:parseNums(item[fieldConfig.numbersField])}));if(!data.length)throw new Error('没有获取到开奖数据');renderCurrent();setupCountdown();renderAIPredict();calculateAllAlgorithmsStats();updateAlgorithmMonitor();renderPredictionTable();isFetching=false;}).catch(e=>{console.error(e);setError('获取数据出错：'+e.message);isFetching=false;});}
function extractArray(res){if(Array.isArray(res))return res;if(res&&typeof res==='object'){const keys=['data','items','list','results','records'];for(const k of keys){if(Array.isArray(res[k]))return res[k];}for(const k in res){if(Array.isArray(res[k]))return res[k];}}return[];}
function parseNums(opennum){if(!opennum)return[];return String(opennum).split(fieldConfig.separator).map(s=>s.trim()).filter(Boolean).map(n=>parseInt(n,10)||0);}
function sum(nums){return nums.reduce((a,b)=>a+b,0);}
function tagBySum(total){const size=total>=14?'大':'小';const oe=(total%2===0)?'双':'单';return{size,oe,combo:size+oe};}
function fmtTime(s){try{if(typeof s==='string'&&s.includes('-')&&s.includes(':')){const now=new Date();const[md,hms]=s.split(' ');const[M,D]=md.split('-').map(Number);const[hh,mm,ss]=hms.split(':').map(Number);const pad=n=>String(n).padStart(2,'0');return`${pad(M)}-${pad(D)} ${pad(hh)}:${pad(mm)}:${pad(ss)}`;}const ts=Number(s);if(!Number.isNaN(ts)){const d=new Date(ts>1e12?ts:ts*1000);const pad=n=>String(n).padStart(2,'0');return`${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;}}catch(e){}return'-- --:--:--';}
function renderCurrent(){const latest=data[0];const period=latest[fieldConfig.periodField]??'--';const nums=latest.nums||[];const s=sum(nums);const t=tagBySum(s);const numsTxt=(nums.length?nums.join('+')+'='+s:'--+--+--=--');const openTime=fmtTime(latest[fieldConfig.timeField]);document.getElementById('cur-period').textContent=period;document.getElementById('cur-nums').textContent=numsTxt;document.getElementById('cur-tag').textContent=t.combo;document.getElementById('cur-time').textContent=openTime;}
function setupCountdown(){if(timer)clearInterval(timer);const latest=data[0];const ts=latest[fieldConfig.timeField];let t=null;try{if(typeof ts==='string'&&ts.includes('-')&&ts.includes(':')){const now=new Date();const[md,hms]=ts.split(' ');const[M,D]=md.split('-').map(Number);const[hh,mm,ss]=hms.split(':').map(Number);t=new Date(now.getFullYear(),M-1,D,hh,mm,ss);}else{const n=Number(ts);t=new Date(n>1e12?n:n*1000);}}catch(e){}if(!t){document.getElementById('cd').style.display='none';return;}nextTime=new Date(t.getTime()+3*60*1000+30*1000);document.getElementById('cd').style.display='block';tick();timer=setInterval(tick,1000);}
function tick(){const now=new Date();const diff=nextTime-now;const el=document.getElementById('cd');const txt=document.getElementById('cd-txt');if(diff<=0){clearInterval(timer);txt.textContent='正在开奖...';el.classList.add('highlight');if(!isFetching){setTimeout(fetchData,1500);}return;}const m=Math.floor(diff/60000);const s=Math.floor((diff%60000)/1000);txt.textContent=`${m}分${String(s).padStart(2,'0')}秒`;if(diff<30000)el.classList.add('highlight');else el.classList.remove('highlight');}

// ==================== 极致算法核心 ====================
const Y5_MAP = {'5y0':[5,10,15,20,25],'5y1':[6,11,16,21,26],'5y2':[7,12,17,22,27],'5y3':[3,8,13,18,23],'5y4':[4,9,14,19,24]};
const Y3_MAP = {'3y0':[0,3,6,9,12,15,18,21,24,27],'3y1':[1,4,7,10,13,16,19,22,25],'3y2':[2,5,8,11,14,17,20,23,26]};
function getY5Group(s){for(let[k,v]of Object.entries(Y5_MAP))if(v.includes(s))return k;return null;}
function getY3Group(s){for(let[k,v]of Object.entries(Y3_MAP))if(v.includes(s))return k;return null;}
function getComboBySum(s){if(s<=13)return s%2===0?'小双':'小单';return s%2===0?'大双':'大单';}

// 5y预测
function predict5y(dataSlice){
    if(!dataSlice||dataSlice.length<2)return null;
    const latest=dataSlice[0];const s=sum(latest.nums);const g=getY5Group(s);if(!g)return null;
    let prev=null;for(let i=1;i<dataSlice.length;i++){const ps=sum(dataSlice[i].nums);if(getY5Group(ps)===g){prev=ps;break;}}
    if(prev===null)return null;
    let pred=s+prev;if(pred>27)pred-=27;
    const combo=getComboBySum(pred);const killMap={'大单':'小双','小双':'大单','大双':'小单','小单':'大双'};
    return {predSum:pred,predCombo:combo,killCombo:killMap[combo]||combo,group:g,prevSum:prev};
}

// 3y预测 (新增)
function predict3y(dataSlice){
    if(!dataSlice||dataSlice.length<2)return null;
    const latest=dataSlice[0];const s=sum(latest.nums);const g=getY3Group(s);if(!g)return null;
    let prev=null;for(let i=1;i<dataSlice.length;i++){const ps=sum(dataSlice[i].nums);if(getY3Group(ps)===g){prev=ps;break;}}
    if(prev===null)return null;
    let pred=s+prev;if(pred>27)pred-=27;
    const combo=getComboBySum(pred);const killMap={'大单':'小双','小双':'大单','大双':'小单','小单':'大双'};
    return {predSum:pred,predCombo:combo,killCombo:killMap[combo]||combo,group:g,prevSum:prev};
}

// 连续形态预测 (基于最近一期组合推导可能的下期组合)
function predictContinuous(dataSlice){
    if(!dataSlice||dataSlice.length<1)return null;
    const lastCombo = getComboBySum(sum(dataSlice[0].nums));
    // 连续形态规则: 大单后可能大双/大单/小单 (不会小双); 小双后可能小单/小双/大双 (不会大单) 等
    const transition = {
        '大单': { likely: ['大双','大单','小单'], kill: '小双' },
        '小双': { likely: ['小单','小双','大双'], kill: '大单' },
        '大双': { likely: ['大单','大双','小双'], kill: '小单' },
        '小单': { likely: ['小双','小单','大单'], kill: '大双' }
    };
    const rule = transition[lastCombo] || { likely: [], kill: '' };
    // 统计近期实际出现频率来调整
    const recent = dataSlice.slice(0,5).map(d=>getComboBySum(sum(d.nums)));
    const freq = {'大单':0,'小双':0,'大双':0,'小单':0};
    recent.forEach(c=>freq[c]++);
    // 选择likely中频率最低的作为推荐，最高的作为防守
    let recommend = rule.likely.sort((a,b)=>freq[a]-freq[b])[0] || rule.likely[0];
    let defense = rule.likely.sort((a,b)=>freq[b]-freq[a])[0] || rule.likely[1];
    return { killCombo: rule.kill, recommendCombo: recommend, defenseCombo: defense, lastCombo };
}

// 回归率分析
function regressionSingle(dataSlice){
    const combos=['小单','小双','大单','大双'];const miss={};
    for(let c of combos){let m=0;for(let i=0;i<dataSlice.length;i++){if(getComboBySum(sum(dataSlice[i].nums))===c)break;m++;}miss[c]=m;}
    let max=-1,target='';for(let c of combos)if(miss[c]>max){max=miss[c];target=c;}
    return {targetCombo:target,missing:max,confidence:max>=5?'极高':(max>=3?'中等':'一般')};
}

// 反向因果(保留核心)
function reverseCausal(dataSlice){
    if(!dataSlice||dataSlice.length<12)return null;
    const w=dataSlice.slice(0,12);let cw={'小单':0,'大双':0,'小双':0,'大单':0};
    let mb6=0,mg4=0;let fb6=false,fg4=false;
    for(let i=0;i<data.length;i++){const it=data[i];if(!it.nums||it.nums.length<3)continue;const b=it.nums[0],g=it.nums[2];if(!fb6&&b===6){fb6=true;mb6=i;}if(!fg4&&g===4){fg4=true;mg4=i;}if(fb6&&fg4)break;}
    if(!fb6)mb6=45;if(!fg4)mg4=42;
    const r6=w.slice(0,6).map(i=>tagBySum(sum(i.nums)).combo);
    const o6=w.slice(6,12).map(i=>tagBySum(sum(i.nums)).combo);
    const cnt=(a)=>({'小单':a.filter(c=>c==='小单').length,'大双':a.filter(c=>c==='大双').length,'小双':a.filter(c=>c==='小双').length,'大单':a.filter(c=>c==='大单').length});
    const rc=cnt(r6),oc=cnt(o6);const tr={};for(let c in rc)tr[c]=rc[c]-oc[c];
    const sl=w.map(i=>sum(i.nums));const avg=sl.reduce((a,b)=>a+b,0)/sl.length;const st=sl[0]-avg;
    const cb=(m)=>m>30?18:(m>20?12:(m>10?6:0));
    cw['小单']=85+tr['小单']*5+cb(mb6)*1.5+cb(mg4)*1.3+(st<-1?8:0);
    cw['大双']=80+tr['大双']*4+(oc['大双']===0&&rc['大双']<=1?20:0)+(st>1?10:0);
    cw['小双']=78+tr['小双']*6+(rc['小双']<=1?12:0);
    cw['大单']=70-(rc['大单']>=3?15:0)-(tr['大单']>1?10:0);
    for(let k in cw)cw[k]=Math.max(25,Math.min(135,cw[k]));
    const sorted=Object.entries(cw).sort((a,b)=>a[1]-b[1]);const kill=sorted[0][0];
    let rec=[],def=[];if(kill==='大单'){rec=['大双','小单'];def=['小双'];}else if(kill==='小双'){rec=['小单','大双'];def=['大单'];}else if(kill==='大双'){rec=['大单','小双'];def=['小单'];}else{rec=['小双','大单'];def=['大双'];}
    return {killCombo:kill,recommend:rec.join('+'),defense:def.join('+'),special:'13,15,16,9,18,11'};
}

// ========== 终极融合决策 ==========
function ultimatePredict(dataSlice){
    if(!dataSlice||dataSlice.length<12)return null;
    const y5=predict5y(dataSlice);
    const y3=predict3y(dataSlice);
    const cont=predictContinuous(dataSlice);
    const reg=regressionSingle(dataSlice);
    const rev=reverseCausal(dataSlice);
    
    // 杀号决策: 投票机制 (5y > 3y > 连续 > 反向)
    let killVotes={'小单':0,'小双':0,'大单':0,'大双':0};
    if(y5) killVotes[y5.killCombo]+=5;
    if(y3) killVotes[y3.killCombo]+=4;
    if(cont) killVotes[cont.killCombo]+=3;
    if(rev) killVotes[rev.killCombo]+=2;
    let finalKill=Object.entries(killVotes).sort((a,b)=>b[1]-a[1])[0][0];
    
    // 杀组 (第二杀号)
    let secondKill='';
    const sortedKill=Object.entries(killVotes).sort((a,b)=>b[1]-a[1]);
    if(sortedKill.length>1) secondKill=sortedKill[1][0];
    const killGroup=`${finalKill}${secondKill?'+'+secondKill:''}`;
    
    // 单组: 回归目标
    const single=reg.targetCombo;
    
    // 推荐/防守 (融合连续形态推荐)
    let recommend=cont?cont.recommendCombo:(rev?rev.recommend.split('+')[0]:'大双');
    let defense=cont?cont.defenseCombo:(rev?rev.defense.split('+')[0]:'小单');
    // 确保不重复
    const allC=['小单','小双','大单','大双'];
    let recList=[recommend]; if(recList[0]===finalKill) recList=[allC.find(c=>c!==finalKill&&c!==single)];
    let defList=[defense]; if(defList[0]===finalKill||defList[0]===single) defList=[allC.find(c=>c!==finalKill&&c!==single&&c!==recList[0])];
    
    // 特码融合
    let spec=y5?`${y5.predSum},`:'';
    if(y3) spec+=`${y3.predSum},`;
    spec+=(rev?rev.special:'13,15,16,9');
    let specArr=[...new Set(spec.split(',').map(Number).filter(n=>!isNaN(n)))];
    specArr.sort((a,b)=>a-b);
    
    return {
        killCombo:finalKill,
        killGroup:killGroup,
        singleGroup:single,
        recommendCombo:recList[0],
        defenseCombo:defList[0],
        specialSumHint:specArr.slice(0,6).join(','),
        y5Info:y5?`${y5.group}→${y5.predSum}杀${y5.killCombo}`:'--',
        y3Info:y3?`${y3.group}→${y3.predSum}杀${y3.killCombo}`:'--',
        contInfo:cont?`${cont.lastCombo}→杀${cont.killCombo}`:'--',
        regInfo:`漏${reg.missing}期·${reg.confidence}`
    };
}

function renderAIPredict(){
    try{
        if(!data.length||data.length<12){document.getElementById('ai').style.display='none';return;}
        const res=ultimatePredict(data);
        if(res){
            document.getElementById('ai-predict-combo').textContent=`🎯杀号：${res.killCombo}`;
            document.getElementById('ai-kill-group').textContent=`📛杀组：${res.killGroup}`;
            document.getElementById('ai-recommend-combo').textContent=`✅推荐：${res.recommendCombo}`;
            document.getElementById('ai-defense-combo').textContent=`🛡️防守：${res.defenseCombo}`;
            document.getElementById('ai-special-sum').textContent=`🔢特码：${res.specialSumHint}`;
            document.getElementById('single-group-result').textContent=`🔥 单组锁定：${res.singleGroup}`;
            document.getElementById('single-group-detail').innerHTML=`${res.regInfo} | 5y:${res.y5Info} | 3y:${res.y3Info} | 连续:${res.contInfo}`;
            document.getElementById('y5-detail').textContent=`5y: ${res.y5Info}`;
            document.getElementById('y3-detail').textContent=`3y: ${res.y3Info}`;
            document.getElementById('continuous-detail').textContent=`连续: ${res.contInfo}`;
            document.getElementById('regression-detail').textContent=`回归: ${res.regInfo}`;
        }
        const np=(()=>{const c=data[0][fieldConfig.periodField];const n=Number(c);if(Number.isFinite(n))return String(n+1);const m=String(c||'').match(/(\d+)(?!.*\d)/);return m?String(Number(m[1])+1):'--';})();
        document.getElementById('ai-nextperiod').textContent=`预测期数：${np}`;
        document.getElementById('ai').style.display='block';
    }catch(e){console.error(e);}
}

function calculateAllAlgorithmsStats(){
    const tp=Math.min(data.length-12,40);let t=0,w=0,cs=0,sw=0,siw=0,kgw=0;
    for(let i=0;i<tp;i++){if(i+12>=data.length)continue;const wd=data.slice(i+1,i+13);if(wd.length<12)continue;const res=ultimatePredict(wd);if(!res)continue;
        const act=tagBySum(sum(data[i].nums));const actSum=sum(data[i].nums);
        if(act.combo!==res.killCombo)w++; t++;
        const kg=res.killGroup.split('+'); if(!kg.includes(act.combo))kgw++;
        if(res.specialSumHint.split(',').map(Number).includes(actSum))sw++;
        if(act.combo===res.singleGroup)siw++;
    }
    for(let i=0;i<tp;i++){if(i+12>=data.length)break;const wd=data.slice(i+1,i+13);if(wd.length<12)continue;const res=ultimatePredict(wd);if(!res)continue;const act=tagBySum(sum(data[i].nums));if(act.combo!==res.killCombo)cs++;else break;}
    algorithmStats.total=t;algorithmStats.win=w;algorithmStats.currentConsecutive=cs;algorithmStats.winRate=t>0?(w/t)*100:0;
    algorithmStats.specialWinRate=t>0?(sw/t)*100:0;algorithmStats.singleWinRate=t>0?(siw/t)*100:0;algorithmStats.killGroupRate=t>0?(kgw/t)*100:0;
}
function updateAlgorithmMonitor(){
    const h=document.getElementById('highest-winrate'),c=document.getElementById('most-consecutive');
    if(algorithmStats.total>0){
        h.innerHTML=`杀号:${algorithmStats.winRate.toFixed(1)}% | 杀组:${algorithmStats.killGroupRate.toFixed(1)}% | 特码:${algorithmStats.specialWinRate.toFixed(1)}% | 单组:${algorithmStats.singleWinRate.toFixed(1)}%`;
        c.textContent=`当前连中：${algorithmStats.currentConsecutive}期`;
    }else{h.textContent='--';c.textContent='--';}
}
function renderPredictionTable(){
    if(data.length<13){document.getElementById('prediction-table-card').style.display='none';return;}
    const tb=document.getElementById('prediction-tbody');tb.innerHTML='';
    const dc=Math.min(data.length-12,20);let wc=0,tc=0,sh=0,sih=0,kgh=0;
    for(let i=0;i<dc;i++){if(i+12>=data.length)continue;const wd=data.slice(i+1,i+13);if(wd.length<12)continue;const res=ultimatePredict(wd);if(!res)continue;
        const cd=data[i];const an=cd.nums||[];const as=sum(an);const at=tagBySum(as);
        let kh='',kcl='';if(at.combo===res.killCombo){kh='❌';kcl='wrong';}else{kh='✅';kcl='correct';wc++;}
        const kg=res.killGroup.split('+');const kgHit=!kg.includes(at.combo);if(kgHit)kgh++;
        const spHit=res.specialSumHint.split(',').map(Number).includes(as);if(spHit)sh++;
        const siHit=(at.combo===res.singleGroup);if(siHit)sih++;
        tc++;
        const r=document.createElement('tr');
        r.innerHTML=`<td>${cd[fieldConfig.periodField]||'--'}</td><td>${an.join('+')}=${as}</td><td>${res.killCombo}</td><td>${res.killGroup}</td><td>${res.recommendCombo}</td><td>${res.defenseCombo}</td><td>${res.singleGroup}</td><td>${res.specialSumHint.substring(0,10)}</td><td class="${kcl}">${kh}</td><td>${spHit?'✅':'❌'}</td><td>${siHit?'✅':'❌'}</td>`;
        tb.appendChild(r);
    }
    if(tc>0){
        document.getElementById('stats').innerHTML=`杀号:${wc}/${tc}=${((wc/tc)*100).toFixed(1)}% | 杀组:${kgh}/${tc}=${((kgh/tc)*100).toFixed(1)}% | 特码:${sh}/${tc}=${((sh/tc)*100).toFixed(1)}% | 单组:${sih}/${tc}=${((sih/tc)*100).toFixed(1)}%`;
    }
    document.getElementById('prediction-table-card').style.display='block';
}
