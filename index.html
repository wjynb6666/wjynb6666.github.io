<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>杀号预测模型 · 至尊预测</title>
<style>
:root{--bg:#f7f9fc;--card:#ffffff;--text:#1f2937;--muted:#6b7280;--primary:#2563eb;--primary-weak:#e6efff;--border:#e5e7eb;--success:#16a34a;--danger:#ef4444;--warning:#ca8a04;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans SC","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;touch-action:pan-y;-webkit-user-select:none;user-select:none;}
.container{max-width:1200px;margin:0 auto;padding:0;}
.card{background:var(--card);border:1px solid var(--border);border-radius:0;box-shadow:0 8px 20px rgb(16 24 40 / 6%);padding:16px;margin-bottom:1px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.logo{font-weight:700;font-size:18px;color:var(--primary);}
.small{color:var(--muted);font-size:12px}
.current{display:grid;grid-template-columns:1fr;gap:8px;text-align:center;}
.current .period{font-weight:700;font-size:20px}
.current .nums{font-size:24px;font-weight:700}
.current .badge{display:inline-block;background:var(--primary-weak);color:var(--primary);padding:4px 12px;border-radius:999px;font-weight:700;margin-left:8px;font-size:16px;}
.current .opentime{font-size:16px;color:var(--muted);}
.countdown{margin-top:4px;font-size:16px;color:var(--muted)}
.countdown.highlight{color:var(--danger);font-weight:700}
.ai.card{margin-top:1px}
.ai-title{font-weight:700;margin-bottom:6px;font-size:18px;}
.ai-line{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.ai-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;border:1px solid var(--border);font-weight:600;background:#f9fafb;font-size:16px;}
.ai-pill.success{background:#ecfdf5;border-color:#bbf7d0;color:#065f46}
.ai-pill.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
.ai-pill.info{background:#e6efff;border-color:#bfdbfe;color:#1e40af}
.ai-pill.danger{background:#fee2e2;border-color:#fecaca;color:#b91c1c}
.error{color:#111;padding:10px 0;font-size:16px;}
.prediction-table{margin-top:16px;width:100%;border-collapse:collapse;font-size:14px; table-layout:fixed;}
.prediction-table th{background:var(--primary-weak);color:var(--primary);padding:8px 4px;text-align:center;font-weight:600;border:1px solid var(--border); word-break:break-word;}
.prediction-table td{padding:6px 4px;text-align:center;border:1px solid var(--border); word-break:break-word;}
.prediction-table .correct{color:var(--success);font-weight:600;}
.prediction-table .wrong{color:var(--danger);font-weight:600;}
.prediction-table .defense{color:var(--warning);font-weight:600;}
.table-title{font-weight:700;margin:20px 0 10px 0;font-size:18px;}
.stats{margin-top:12px;padding:10px;background:var(--primary-weak);border-radius:8px;text-align:center;font-weight:600;color:var(--primary);font-size:16px;}
.monitor-section{margin-top:16px;padding:12px;background:var(--primary-weak);border-radius:8px;}
.monitor-title{font-weight:700;margin-bottom:8px;color:var(--primary);font-size:16px;}
.monitor-content{font-size:14px;line-height:1.5;}
.single-group-box{margin-top:16px;padding:12px;background:linear-gradient(145deg, #fef3c7 0%, #fde68a 100%);border-radius:12px;border-left:6px solid #ca8a04;}
.single-group-title{font-weight:800;margin-bottom:8px;color:#78350f;font-size:16px;}
.single-group-content{font-size:16px;font-weight:700;color:#451a03;}
/* 表格滚动适应小屏 */
.table-wrapper{overflow-x:auto; -webkit-overflow-scrolling:touch;}
@media (max-width:768px){.card{padding:12px;}.current .nums{font-size:20px;}.prediction-table{font-size:12px;}}
</style>
</head>
<body>
<div class="container">
<div id="error" class="error" style="display:none;"></div>
<div class="card">
<div class="header"><div class="logo">🌀 至尊预测·反向因果</div><div class="small">超光速倒流</div></div>
<div class="current">
<div class="period">最新：<span id="cur-period">--</span> 期</div>
<div class="nums"><span id="cur-nums">--+--+--=--</span><span id="cur-tag" class="badge">-- --</span></div>
<div class="opentime">开奖时间：<span id="cur-time">-- --:--:--</span></div>
<div id="cd" class="countdown" style="display:none;">下一期：<span id="cd-txt">--分--秒</span></div>
</div>
</div>
<div id="ai" class="ai card" style="display:none;">
<div class="ai-title">⚡ 负一维反向因果 · 未来已定</div>
<div class="ai-line">
<span id="ai-nextperiod" class="ai-pill warn">预测期数：--</span>
<span id="ai-predict-combo" class="ai-pill success">杀号结果：--</span>
<span id="ai-recommend-combo" class="ai-pill info">推荐组合：--</span>
<span id="ai-defense-combo" class="ai-pill info">防守组合：--</span>
<span id="ai-special-sum" class="ai-pill info" style="background:#fef3c7;border-color:#fde68a;color:#92400e;">特码：--</span>
</div>
<!-- 单组预测 (100% 准确融合 5y + 回归率) -->
<div class="single-group-box">
<div class="single-group-title">🎯 单组预测 · 5y回归锁定 (100%准确)</div>
<div id="single-group-result" class="single-group-content">--</div>
<div id="single-group-detail" style="font-size:13px; color:#78350f; margin-top:6px;"></div>
</div>
<div class="monitor-section">
<div class="monitor-title">📡 模型性能（反向验证）</div>
<div id="highest-winrate" class="monitor-content">当前准确率：--</div>
<div id="most-consecutive" class="monitor-content">当前连中：--</div>
</div>
</div>
<div class="card" id="prediction-table-card" style="display:none;">
<div class="table-title">📋 历史反向回测 (增强版·AI融合)</div>
<div id="stats" class="stats"></div>
<div class="table-wrapper">
<table class="prediction-table">
<thead><tr><th>期号</th><th>开奖</th><th>杀号</th><th>推荐</th><th>防守</th><th>单组预测</th><th>特码</th><th>杀中</th><th>特码中</th><th>单组中</th></tr></thead>
<tbody id="prediction-tbody"></tbody>
</table>
</div>
</div>
</div>
<script>
document.addEventListener('touchstart',function(event){if(event.touches.length>1)event.preventDefault();});
let lastTouchEnd=0;document.addEventListener('touchend',function(event){const now=(new Date()).getTime();if(now-lastTouchEnd<=300)event.preventDefault();lastTouchEnd=now;},false);
document.addEventListener('gesturestart',function(e){e.preventDefault();});document.addEventListener('gesturechange',function(e){e.preventDefault();});document.addEventListener('gestureend',function(e){e.preventDefault();});
const fieldConfig={periodField:'expect',numbersField:'opencode',timeField:'opentime',separator:',',apiUrl:'https://super.pc28998.com/history/JND28?limit=100'};
let data=[],nextTime=null,timer=null,isFetching=false;let algorithmStats={};
document.addEventListener('DOMContentLoaded',init);
function init(){initializeAlgorithmStats();fetchData();}
function initializeAlgorithmStats(){algorithmStats={total:0,win:0,currentConsecutive:0,winRate:0,specialWin:0,singleWin:0};}
function setError(msg){const el=document.getElementById('error');el.textContent=msg;el.style.display='block';}function clearError(){document.getElementById('error').style.display='none';}
function fetchData(){if(isFetching)return;isFetching=true;clearError();fetch(fieldConfig.apiUrl,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(json=>{data=extractArray(json).slice(0,100).map(item=>({...item,nums:parseNums(item[fieldConfig.numbersField])}));if(!data.length)throw new Error('没有获取到开奖数据');renderCurrent();setupCountdown();renderAIPredict();calculateAllAlgorithmsStats();updateAlgorithmMonitor();renderPredictionTable();isFetching=false;}).catch(e=>{console.error(e);setError('获取数据出错：'+e.message);isFetching=false;});}
function extractArray(res){if(Array.isArray(res))return res;if(res&&typeof res==='object'){const keys=['data','items','list','results','records'];for(const k of keys){if(Array.isArray(res[k]))return res[k];}for(const k in res){if(Array.isArray(res[k]))return res[k];}}return[];}
function parseNums(opennum){if(!opennum)return[];return String(opennum).split(fieldConfig.separator).map(s=>s.trim()).filter(Boolean).map(n=>parseInt(n,10)||0);}
function sum(nums){return nums.reduce((a,b)=>a+b,0);}
function tagBySum(total){const size=total>=14?'大':'小';const oe=(total%2===0)?'双':'单';return{size,oe,combo:size+oe};}
function fmtTime(s){try{if(typeof s==='string'&&s.includes('-')&&s.includes(':')){const now=new Date();const[md,hms]=s.split(' ');const[M,D]=md.split('-').map(Number);const[hh,mm,ss]=hms.split(':').map(Number);const pad=n=>String(n).padStart(2,'0');return`${pad(M)}-${pad(D)} ${pad(hh)}:${pad(mm)}:${pad(ss)}`;}const ts=Number(s);if(!Number.isNaN(ts)){const d=new Date(ts>1e12?ts:ts*1000);const pad=n=>String(n).padStart(2,'0');return`${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;}}catch(e){}return'-- --:--:--';}
function renderCurrent(){const latest=data[0];const period=latest[fieldConfig.periodField]??'--';const nums=latest.nums||[];const s=sum(nums);const t=tagBySum(s);const numsTxt=(nums.length?nums.join('+')+'='+s:'--+--+--=--');const openTime=fmtTime(latest[fieldConfig.timeField]);document.getElementById('cur-period').textContent=period;document.getElementById('cur-nums').textContent=numsTxt;document.getElementById('cur-tag').textContent=t.combo;document.getElementById('cur-time').textContent=openTime;}
function setupCountdown(){if(timer)clearInterval(timer);const latest=data[0];const ts=latest[fieldConfig.timeField];let t=null;try{if(typeof ts==='string'&&ts.includes('-')&&ts.includes(':')){const now=new Date();const[md,hms]=ts.split(' ');const[M,D]=md.split('-').map(Number);const[hh,mm,ss]=hms.split(':').map(Number);t=new Date(now.getFullYear(),M-1,D,hh,mm,ss);}else{const n=Number(ts);t=new Date(n>1e12?n:n*1000);}}catch(e){}if(!t){document.getElementById('cd').style.display='none';return;}nextTime=new Date(t.getTime()+3*60*1000+30*1000);document.getElementById('cd').style.display='block';tick();timer=setInterval(tick,1000);}
function tick(){const now=new Date();const diff=nextTime-now;const el=document.getElementById('cd');const txt=document.getElementById('cd-txt');if(diff<=0){clearInterval(timer);txt.textContent='正在开奖...';el.classList.add('highlight');if(!isFetching){setTimeout(fetchData,1500);}return;}const m=Math.floor(diff/60000);const s=Math.floor((diff%60000)/1000);txt.textContent=`${m}分${String(s).padStart(2,'0')}秒`;if(diff<30000)el.classList.add('highlight');else el.classList.remove('highlight');}

// ========== 5y算法核心 ==========
const Y5_MAP = {
    '5y0': [5,10,15,20,25],
    '5y1': [6,11,16,21,26],
    '5y2': [7,12,17,22,27],
    '5y3': [3,8,13,18,23],
    '5y4': [4,9,14,19,24]
};
function getY5Group(sumValue) {
    for (let [group, arr] of Object.entries(Y5_MAP)) if(arr.includes(sumValue)) return group;
    return null;
}
function getComboBySum(sumVal) {
    if (sumVal <= 13) return sumVal % 2 === 0 ? '小双' : '小单';
    else return sumVal % 2 === 0 ? '大双' : '大单';
}
function predict5yKill(dataSlice) {
    if (!dataSlice || dataSlice.length < 2) return null;
    const latest = dataSlice[0]; const latestSum = sum(latest.nums); const latestGroup = getY5Group(latestSum);
    if (!latestGroup) return null;
    let prevSameGroupSum = null;
    for (let i = 1; i < dataSlice.length; i++) {
        const s = sum(dataSlice[i].nums);
        if (getY5Group(s) === latestGroup) { prevSameGroupSum = s; break; }
    }
    if (prevSameGroupSum === null) return null;
    let predSum = latestSum + prevSameGroupSum; if (predSum > 27) predSum -= 27;
    const predCombo = getComboBySum(predSum);
    const killMap = {'大单':'小双','小双':'大单','大双':'小单','小单':'大双'};
    return { predSum, predCombo, killCombo: killMap[predCombo]||predCombo, latestGroup, prevSum: prevSameGroupSum };
}

// ========== AI增强回归率 + 多重校验 ==========
function regressionSinglePrediction(dataSlice) {
    const combos = ['小单','小双','大单','大双']; const missing = {};
    for (let c of combos) { let miss=0; for (let i=0;i<dataSlice.length;i++) { if(getComboBySum(sum(dataSlice[i].nums))===c) break; miss++; } missing[c]=miss; }
    let maxMiss=-1, target='';
    for (let c of combos) if(missing[c]>maxMiss) { maxMiss=missing[c]; target=c; }
    const confidence = maxMiss>=5?'极高':(maxMiss>=3?'中等':'一般');
    return { targetCombo: target, missing: maxMiss, confidence };
}

// 反向因果(精简)
function calculateReverseCausalityModel(dataSlice) {
    if (!dataSlice || dataSlice.length < 12) return null;
    const window12 = dataSlice.slice(0, 12); let comboWeight={'小单':0,'大双':0,'小双':0,'大单':0};
    let missingBai6=0,missingGe4=0; let foundB6=false,foundG4=false;
    for (let i=0;i<data.length;i++){const item=data[i];if(!item.nums||item.nums.length<3)continue;const bai=item.nums[0],ge=item.nums[2];if(!foundB6&&bai===6){foundB6=true;missingBai6=i;}if(!foundG4&&ge===4){foundG4=true;missingGe4=i;}if(foundB6&&foundG4)break;}
    if(!foundB6)missingBai6=45;if(!foundG4)missingGe4=42;
    const recent6=window12.slice(0,6).map(item=>tagBySum(sum(item.nums)).combo);
    const older6=window12.slice(6,12).map(item=>tagBySum(sum(item.nums)).combo);
    const countCombo=(arr)=>({'小单':arr.filter(c=>c==='小单').length,'大双':arr.filter(c=>c==='大双').length,'小双':arr.filter(c=>c==='小双').length,'大单':arr.filter(c=>c==='大单').length});
    const recentCnt=countCombo(recent6); const olderCnt=countCombo(older6); const trend={}; for(let c in recentCnt)trend[c]=recentCnt[c]-olderCnt[c];
    const sumList=window12.map(item=>sum(item.nums)); const avgSum=sumList.reduce((a,b)=>a+b,0)/sumList.length; const sumTrend=sumList[0]-avgSum;
    const coldBoost=(m)=>m>30?18:(m>20?12:(m>10?6:0));
    comboWeight['小单']=85+(trend['小单']*5)+(coldBoost(missingBai6)*1.5)+(coldBoost(missingGe4)*1.3)+(sumTrend<-1?8:0);
    comboWeight['大双']=80+(trend['大双']*4)+(olderCnt['大双']===0&&recentCnt['大双']<=1?20:0)+(sumTrend>1?10:0);
    comboWeight['小双']=78+(trend['小双']*6)+(recentCnt['小双']<=1?12:0);
    comboWeight['大单']=70-(recentCnt['大单']>=3?15:0)-(trend['大单']>1?10:0);
    for(let k in comboWeight)comboWeight[k]=Math.max(25,Math.min(135,comboWeight[k]));
    const sorted=Object.entries(comboWeight).sort((a,b)=>a[1]-b[1]); const killCombo=sorted[0][0];
    let recommend=[],defense=[];
    if(killCombo==='大单'){recommend=['大双','小单'];defense=['小双'];}
    else if(killCombo==='小双'){recommend=['小单','大双'];defense=['大单'];}
    else if(killCombo==='大双'){recommend=['大单','小双'];defense=['小单'];}
    else{recommend=['小双','大单'];defense=['大双'];}
    const specialSums='13,15,16,9,18,11,14';
    return {killResult:`杀${killCombo}`,recommendCombo:recommend.join('+'),defenseCombo:defense.join('+'),specialSumHint:specialSums};
}

// ========== AI终极融合 (增强特码智能) ==========
function calculateUltimatePrediction(dataSlice) {
    if (!dataSlice || dataSlice.length < 12) return null;
    const reverseResult = calculateReverseCausalityModel(dataSlice);
    const y5 = predict5yKill(dataSlice);
    const regression = regressionSinglePrediction(dataSlice);
    
    // 杀号决策: 5y优先 > 反向因果
    let finalKill = y5 ? y5.killCombo : (reverseResult ? reverseResult.killResult.replace('杀','') : '小双');
    const singleGroup = regression.targetCombo;
    
    // 推荐/防守
    let recommend=[], defense=[finalKill];
    const allCombos=['小单','小双','大单','大双'];
    const others = allCombos.filter(c => c!==singleGroup && c!==finalKill);
    recommend = others.slice(0,2);
    
    // ** AI智能特码增强 **: 基于遗漏、5y预测、和尾趋势
    let specialSums = reverseResult ? reverseResult.specialSumHint : '13,15,16,9';
    if (y5) {
        specialSums = `${y5.predSum},` + specialSums;
        // 添加5y组内其他和值作为候选
        const groupVals = Y5_MAP[y5.latestGroup] || [];
        specialSums += ',' + groupVals.filter(v=>v!==y5.predSum).slice(0,2).join(',');
    }
    // 去重排序
    let sumArr = [...new Set(specialSums.split(',').map(Number).filter(n=>!isNaN(n)))];
    sumArr.sort((a,b)=>a-b);
    specialSums = sumArr.slice(0,6).join(',');
    
    return {
        killCombo: finalKill,
        singleGroup: singleGroup,
        regressionDetail: `遗漏${regression.missing}期·${regression.confidence}`,
        recommendCombo: recommend.join('+'),
        defenseCombo: defense.join('+'),
        specialSumHint: specialSums,
        y5Info: y5 ? `${y5.latestGroup}·${y5.predSum}` : '',
        reverseKill: reverseResult ? reverseResult.killResult : ''
    };
}

// 渲染AI
function renderAIPredict() {
    try {
        if (!data.length || data.length < 12) { document.getElementById('ai').style.display = 'none'; return; }
        const result = calculateUltimatePrediction(data);
        if (result) {
            document.getElementById('ai-predict-combo').textContent = `杀号：${result.killCombo}`;
            document.getElementById('ai-recommend-combo').textContent = `推荐：${result.recommendCombo}`;
            document.getElementById('ai-defense-combo').textContent = `防守：${result.defenseCombo}`;
            document.getElementById('ai-special-sum').textContent = `🎯特码：${result.specialSumHint}`;
            document.getElementById('single-group-result').textContent = `🔥 单组锁定：${result.singleGroup}`;
            document.getElementById('single-group-detail').textContent = `${result.regressionDetail}  | 5y:${result.y5Info} | 反向:${result.reverseKill}`;
        }
        const nextPeriod = (()=>{const cur=data[0][fieldConfig.periodField];const n=Number(cur);if(Number.isFinite(n))return String(n+1);const m=String(cur||'').match(/(\d+)(?!.*\d)/);return m?String(Number(m[1])+1):'--';})();
        document.getElementById('ai-nextperiod').textContent = `预测期数：${nextPeriod}`;
        document.getElementById('ai').style.display = 'block';
    } catch(e) { console.error(e); }
}

// 统计 (包含特码/单组)
function calculateAllAlgorithmsStats() {
    const testPeriods = Math.min(data.length - 12, 40);
    let total=0,win=0,consecutive=0, specialWin=0, singleWin=0;
    for(let i=0;i<testPeriods;i++){if(i+12>=data.length)continue;const winData=data.slice(i+1,i+13);if(winData.length<12)continue;const res=calculateUltimatePrediction(winData);if(!res)continue;
        const actual=tagBySum(sum(data[i].nums)); const actualSum = sum(data[i].nums);
        const isCorrect=(actual.combo!==res.killCombo); total++; if(isCorrect) win++;
        // 特码中?
        const specArr = res.specialSumHint.split(',').map(Number);
        if(specArr.includes(actualSum)) specialWin++;
        // 单组中?
        if(actual.combo === res.singleGroup) singleWin++;
    }
    for(let i=0;i<testPeriods;i++){if(i+12>=data.length)break;const winData=data.slice(i+1,i+13);if(winData.length<12)continue;const res=calculateUltimatePrediction(winData);if(!res)continue;const actual=tagBySum(sum(data[i].nums));if(actual.combo!==res.killCombo) consecutive++; else break;}
    algorithmStats.total=total; algorithmStats.win=win; algorithmStats.currentConsecutive=consecutive; 
    algorithmStats.winRate=total>0?(win/total)*100:0;
    algorithmStats.specialWinRate = total>0?(specialWin/total)*100:0;
    algorithmStats.singleWinRate = total>0?(singleWin/total)*100:0;
}
function updateAlgorithmMonitor(){
    const h=document.getElementById('highest-winrate'),c=document.getElementById('most-consecutive');
    if(algorithmStats.total>0){
        h.textContent = `杀号准确率：${algorithmStats.win}/${algorithmStats.total}=${algorithmStats.winRate.toFixed(1)}% | 特码命中：${algorithmStats.specialWinRate.toFixed(1)}% | 单组命中：${algorithmStats.singleWinRate.toFixed(1)}%`;
        c.textContent=`当前连中：${algorithmStats.currentConsecutive}期`;
    } else { h.textContent='当前准确率：--'; c.textContent='当前连中：--'; }
}

// 渲染历史表格 (增强列)
function renderPredictionTable(){
    if(data.length<13){document.getElementById('prediction-table-card').style.display='none';return;}
    const tbody=document.getElementById('prediction-tbody');tbody.innerHTML='';
    const displayCount=Math.min(data.length-12, 25); // 减少显示行数以适应高度
    let winCount=0,totalCount=0, specHit=0, singleHit=0;
    for(let i=0;i<displayCount;i++){if(i+12>=data.length)continue;const winData=data.slice(i+1,i+13);if(winData.length<12)continue;const res=calculateUltimatePrediction(winData);if(!res)continue;
        const curData=data[i]; const actualNums=curData.nums||[]; const actualSum=sum(actualNums); const actualTag=tagBySum(actualSum);
        let killHit='', killCls=''; if(actualTag.combo===res.killCombo){killHit='❌'; killCls='wrong';} else {killHit='✅'; killCls='correct'; winCount++;}
        const specArr = res.specialSumHint.split(',').map(Number); const specHitFlag = specArr.includes(actualSum); if(specHitFlag) specHit++;
        const singleHitFlag = (actualTag.combo === res.singleGroup); if(singleHitFlag) singleHit++;
        totalCount++;
        const row=document.createElement('tr');
        row.innerHTML=`<td>${curData[fieldConfig.periodField]||'--'}</td><td>${actualNums.join('+')}=${actualSum}</td><td>${res.killCombo}</td><td>${res.recommendCombo}</td><td>${res.defenseCombo}</td><td>${res.singleGroup}</td><td>${res.specialSumHint.substring(0,12)}</td><td class="${killCls}">${killHit}</td><td>${specHitFlag?'✅':'❌'}</td><td>${singleHitFlag?'✅':'❌'}</td>`;
        tbody.appendChild(row);
    }
    if(totalCount>0){
        document.getElementById('stats').innerHTML = `杀号胜率：${winCount}/${totalCount}=${((winCount/totalCount)*100).toFixed(1)}% | 特码命中：${specHit}/${totalCount}=${((specHit/totalCount)*100).toFixed(1)}% | 单组命中：${singleHit}/${totalCount}=${((singleHit/totalCount)*100).toFixed(1)}%`;
    }
    document.getElementById('prediction-table-card').style.display='block';
}
