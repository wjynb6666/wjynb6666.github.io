<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>至尊算法 - 加拿大28杀组预测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 15px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* 头部样式 */
        .header {
            background: linear-gradient(145deg, #1e2436, #13182a);
            padding: 20px 15px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 224, 208, 0.2);
            position: relative;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
        
        .header h1 {
            color: #00e0d0;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            margin-bottom: 8px;
            text-shadow: 0 0 15px rgba(0, 224, 208, 0.3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 10px;
        }
        
        .header .subtitle {
            color: #a0b0d0;
            font-size: clamp(0.8rem, 3vw, 0.95rem);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 0 10px;
        }
        
        .header .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 224, 208, 0.1);
            border: 1px solid #00e0d0;
            color: #00e0d0;
            padding: 6px 15px;
            border-radius: 30px;
            margin-top: 12px;
            font-size: 0.85rem;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* 最新开奖卡片 */
        .latest-card {
            background: linear-gradient(145deg, #1e2436, #151b2b);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 224, 208, 0.2);
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }
        
        .latest-title {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 224, 208, 0.1);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid rgba(0, 224, 208, 0.3);
            flex-shrink: 0;
        }
        
        .latest-title i {
            color: #00e0d0;
            font-size: 1rem;
        }
        
        .latest-title span {
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .latest-numbers {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .ball {
            width: clamp(35px, 8vw, 45px);
            height: clamp(35px, 8vw, 45px);
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #00e0d0, #008080);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: clamp(1rem, 4vw, 1.3rem);
            color: #000;
            box-shadow: 0 3px 8px rgba(0, 224, 208, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }
        
        .sum-ball {
            width: clamp(40px, 9vw, 50px);
            height: clamp(40px, 9vw, 50px);
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff6b4a, #d84c00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: clamp(1.1rem, 4.5vw, 1.4rem);
            color: #000;
            box-shadow: 0 3px 8px rgba(216, 76, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }
        
        .plus, .equal {
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            color: #00e0d0;
            font-weight: bold;
        }
        
        .latest-info {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        
        /* 主内容网格 */
        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* 数据面板 */
        .data-panel {
            background: linear-gradient(145deg, #1e2436, #151b2b);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(0, 224, 208, 0.2);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            width: 100%;
            overflow: hidden;
        }
        
        .panel-title {
            color: #00e0d0;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(0, 224, 208, 0.2);
        }
        
        .panel-title i {
            font-size: 1.1rem;
            background: rgba(0, 224, 208, 0.1);
            padding: 6px;
            border-radius: 10px;
        }
        
        /* 历史记录表格容器 */
        .table-container {
            max-height: 380px;
            overflow-y: auto;
            overflow-x: auto;
            border-radius: 12px;
            scrollbar-width: thin;
            scrollbar-color: #00e0d0 #1e2436;
        }
        
        .history-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 400px;
        }
        
        .history-table th {
            background: rgba(0, 224, 208, 0.1);
            color: #00e0d0;
            padding: 10px 5px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .history-table td {
            padding: 8px 5px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #e0e0e0;
            font-size: 0.85rem;
        }
        
        .small-ball {
            display: inline-block;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00e0d0, #008080);
            color: #000;
            font-weight: bold;
            line-height: 24px;
            text-align: center;
            margin: 0 1px;
            font-size: 0.8rem;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .stat-label {
            color: #a0b0d0;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        
        .stat-value {
            color: #00e0d0;
            font-size: 1.5rem;
            font-weight: bold;
            line-height: 1.2;
        }
        
        /* 最近三期容器 */
        .recent-container {
            max-height: 280px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .recent-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 10px;
            border-left: 4px solid #00e0d0;
        }
        
        /* 进度条 */
        .progress-bar {
            background: rgba(0, 0, 0, 0.3);
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 6px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00e0d0, #00a0ff);
            color: #000;
            font-size: 0.8rem;
            line-height: 20px;
            padding-left: 8px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* 预测结果面板 */
        .result-panel {
            background: linear-gradient(145deg, #1e2436, #151b2b);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(0, 224, 208, 0.2);
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            width: 100%;
            overflow: hidden;
        }
        
        .result-header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .result-title {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .result-title i {
            font-size: 1.3rem;
            color: #00e0d0;
            background: rgba(0, 224, 208, 0.1);
            padding: 8px;
            border-radius: 12px;
        }
        
        .result-title h2 {
            color: #fff;
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            font-weight: 600;
        }
        
        .result-title span {
            color: #00e0d0;
            font-size: 0.85rem;
            background: rgba(0, 224, 208, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
        }
        
        .kill-group-box {
            background: linear-gradient(145deg, rgba(216, 76, 0, 0.2), rgba(216, 76, 0, 0.1));
            border: 2px solid #d84c00;
            border-radius: 40px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .kill-group-label {
            color: #ffa680;
            font-size: 0.85rem;
        }
        
        .kill-group-value {
            color: #ff6b4a;
            font-size: 1.6rem;
            font-weight: bold;
        }
        
        /* 推荐组合 */
        .groups-container {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .group-tag {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #000;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.95rem;
            box-shadow: 0 3px 8px rgba(46, 204, 113, 0.2);
            white-space: nowrap;
        }
        
        /* 特码表格容器 */
        .table-responsive {
            overflow-x: auto;
            margin: 15px 0;
            border-radius: 14px;
        }
        
        .codes-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 400px;
        }
        
        .codes-table th {
            background: rgba(0, 224, 208, 0.1);
            color: #00e0d0;
            padding: 12px 5px;
            font-size: 1rem;
            font-weight: 600;
        }
        
        .codes-table td {
            padding: 12px 5px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
        }
        
        .code-cell {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .code-badge {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            color: #000;
            border: 2px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }
        
        .code-badge.safe {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
        }
        
        .code-badge.extreme {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        
        /* 最终特码 */
        .final-codes {
            background: linear-gradient(145deg, rgba(46, 204, 113, 0.1), rgba(46, 204, 113, 0.05));
            padding: 18px;
            border-radius: 16px;
            margin-top: 18px;
            border-left: 4px solid #2ecc71;
        }
        
        .final-codes-title {
            color: #2ecc71;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .final-codes-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .final-ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            animation: pulse 2s infinite;
            border: 2px solid rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
        }
        
        .final-ball.safe {
            background: radial-gradient(circle at 30% 30%, #2ecc71, #27ae60);
        }
        
        .final-ball.extreme {
            background: radial-gradient(circle at 30% 30%, #e74c3c, #c0392b);
        }
        
        /* 命中情况面板 */
        .hit-panel {
            background: linear-gradient(145deg, #1e2436, #151b2b);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(0, 224, 208, 0.2);
            margin-bottom: 20px;
            width: 100%;
            overflow: hidden;
        }
        
        .hit-title {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00e0d0;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        
        .hit-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }
        
        .hit-stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 14px;
            text-align: center;
        }
        
        .hit-stat-label {
            color: #a0b0d0;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        
        .hit-stat-value {
            color: #00e0d0;
            font-size: 1.4rem;
            font-weight: bold;
            line-height: 1.2;
        }
        
        .hit-stat-desc {
            color: #888;
            font-size: 0.7rem;
            margin-top: 5px;
        }
        
        /* 命中表格容器 */
        .hit-table-container {
            max-height: 300px;
            overflow-y: auto;
            overflow-x: auto;
            border-radius: 12px;
        }
        
        .hit-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }
        
        .hit-table th {
            background: rgba(0, 224, 208, 0.1);
            color: #00e0d0;
            padding: 10px 5px;
            font-size: 0.85rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .hit-table td {
            padding: 8px 5px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
        }
        
        .hit-success {
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.1);
            padding: 3px 8px;
            border-radius: 20px;
            display: inline-block;
            white-space: nowrap;
        }
        
        .hit-fail {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
            padding: 3px 8px;
            border-radius: 20px;
            display: inline-block;
            white-space: nowrap;
        }
        
        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00e0d0, #008080);
            color: #000;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #000;
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid #00e0d0;
            color: #00e0d0;
        }
        
        /* 统计信息 */
        .stats-info {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 15px;
            color: #a0b0d0;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 30px;
            flex-wrap: wrap;
            font-size: 0.85rem;
        }
        
        /* 算法说明 */
        .info-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 14px;
            margin-top: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }
        
        /* 手动输入模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        .modal-content {
            background: linear-gradient(145deg, #1e2436, #151b2b);
            padding: 25px;
            border-radius: 24px;
            width: 100%;
            max-width: 500px;
            border: 1px solid #00e0d0;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-content h3 {
            color: #00e0d0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
        }
        
        .input-field {
            margin-bottom: 18px;
        }
        
        .input-field label {
            color: #88e0d8;
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        
        .input-field input {
            width: 100%;
            padding: 12px 15px;
            background: #222;
            border: 2px solid #333;
            color: #fff;
            border-radius: 12px;
            font-size: 1rem;
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 0.8rem;
            padding: 15px;
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1e2436;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #00e0d0;
            border-radius: 10px;
        }
        
        /* 动画 */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        
        /* 移动端优化 */
        @media (max-width: 600px) {
            body { padding: 8px; }
            
            .latest-card {
                flex-direction: column;
                align-items: stretch;
            }
            
            .latest-numbers {
                order: -1;
            }
            
            .ball {
                width: 40px;
                height: 40px;
                font-size: 1.1rem;
            }
            
            .sum-ball {
                width: 45px;
                height: 45px;
                font-size: 1.2rem;
            }
            
            .kill-group-box {
                width: 100%;
                justify-content: center;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .stats-info {
                flex-direction: column;
                align-items: center;
                gap: 8px;
            }
            
            .final-ball {
                width: 45px;
                height: 45px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>📊 至尊算法</h1>
            <div class="subtitle">
                <span>三期统计</span>
                <span>·</span>
                <span>杀最少</span>
                <span>·</span>
                <span>避极端</span>
            </div>
            <div class="badge">
                <i class="fas fa-calculator"></i>
                近20期命中分析
            </div>
        </div>
        
        <!-- 最新开奖 -->
        <div class="latest-card" id="latestCard">
            <div class="latest-title">
                <i class="fas fa-crown"></i>
                <span>最新开奖</span>
            </div>
            <div class="latest-numbers" id="latestNumbers">
                <div class="ball">-</div>
                <span class="plus">+</span>
                <div class="ball">-</div>
                <span class="plus">+</span>
                <div class="ball">-</div>
                <span class="equal">=</span>
                <div class="sum-ball">-</div>
            </div>
            <div class="latest-info" id="latestInfo">
                <span>期号 <strong>---</strong></span>
            </div>
        </div>
        
        <!-- 主内容网格 -->
        <div class="main-grid">
            <!-- 左侧：历史数据 -->
            <div class="data-panel">
                <div class="panel-title">
                    <i class="fas fa-history"></i>
                    最近10期开奖
                </div>
                <div class="table-container">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>期号</th>
                                <th>号码</th>
                                <th>和值</th>
                                <th>组合</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">

                <div class="stats-grid">

            <!-- 右侧：三期统计 -->
            <div class="data-panel">

                    最近三期统计

                <div class="recent-container" id="recentPeriods">

                <div class="stat-card" style="margin-top: 10px;">

        <!-- 预测结果 -->
        <div class="result-panel" id="resultPanel" style="display: none;">
            <div class="result-header">
                <div class="result-title">

                    <h2>本期预测</h2>
                    <span id="predictPeriod">---</span>
                </div>
                <div class="kill-group-box">
                    <span class="kill-group-label">🎯 杀组</span>
                    <span class="kill-group-value" id="killGroup">--</span>
                </div>
            </div>
            
            <!-- 推荐组合 -->
            <div style="margin-bottom: 5px;">
                <div style="color: #88e0d8; margin-bottom: 8px; font-size: 0.95rem;">
                    <i class="fas fa-star" style="color: #ffd700;"></i> 推荐组合
                </div>
                <div class="groups-container" id="recommendGroups">
                    <!-- 推荐组合标签 -->
                </div>
            </div>
            
            <!-- 特码表格 -->
            <div class="table-responsive">
                <table class="codes-table" id="codesTable">

                </table>

            <!-- 最终特码 -->
            <div class="final-codes">
                <div class="final-codes-title">

                <div class="final-codes-container" id="finalCodes">

        <!-- 近20期命中情况 -->
        <div class="hit-panel" id="hitPanel" style="display: none;">
            <div class="hit-title">
                <i class="fas fa-chart-pie"></i>
                近20期命中分析
            </div>
            
            <div class="hit-stats">
                <div class="hit-stat-card">
                    <div class="hit-stat-label">杀组命中</div>
                    <div class="hit-stat-value" id="killHitRate">0%</div>
                    <div class="hit-stat-desc" id="killHitDesc">0/0</div>
                </div>
                <div class="hit-stat-card">
                    <div class="hit-stat-label">特码命中</div>
                    <div class="hit-stat-value" id="codeHitRate">0%</div>
                    <div class="hit-stat-desc" id="codeHitDesc">0/0</div>
                </div>
                <div class="hit-stat-card">
                    <div class="hit-stat-label">综合得分</div>
                    <div class="hit-stat-value" id="totalScore">0</div>
                    <div class="hit-stat-desc">平均命中率</div>
                </div>
            </div>
            
            <div class="hit-table-container">
                <table class="hit-table">
                    <thead>
                        <tr>
                            <th>期号</th>
                            <th>实际</th>
                            <th>杀组</th>
                            <th>杀组</th>
                            <th>特码</th>
                            <th>特码</th>
                        </tr>
                    </thead>
                    <tbody id="hitBody">
                        <!-- 命中情况动态填充 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 按钮组 -->
        <div class="button-group">
            <button class="btn btn-primary" id="refreshBtn">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
            <button class="btn btn-success" id="analyzeBtn">
                <i class="fas fa-chart-line"></i> 命中率
            </button>
            <button class="btn btn-outline" id="manualBtn">
                <i class="fas fa-pen"></i> 手动
            </button>
        </div>
        
        <!-- 算法说明 -->
        <div class="info-box">
            <div style="display: flex; align-items: center; gap: 8px; color: #00e0d0; margin-bottom: 8px;">
                <i class="fas fa-info-circle"></i>
                <span style="font-weight: 600;">算法说明</span>
            </div>
            <p style="color: #a0b0d0; line-height: 1.5; font-size: 0.9rem;">
                三期相同则杀对组，否则杀出现最少组合。优先选择5-23安全数字<span style="color: #2ecc71;">●</span>，
                避免极端数字<span style="color: #e74c3c;">●</span>和重复。
            </p>
        </div>
        
        <!-- 页脚 -->
        <div class="footer">
            <p>至尊算法 - 加拿大28杀组预测 | 数据仅供参考</p>
        </div>
    </div>
    
    <!-- 手动输入模态框 -->
    <div class="modal-overlay" id="manualModal">
        <div class="modal-content">
            <h3>
                <i class="fas fa-pen-fancy"></i> 手动输入
            </h3>
            
            <div id="inputFields">
                <!-- 动态生成输入框 -->
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-success" style="flex: 1;" id="submitManual">
                    <i class="fas fa-check"></i> 计算
                </button>
                <button class="btn btn-outline" style="flex: 1;" id="closeManual">
                    <i class="fas fa-times"></i> 取消
                </button>
            </div>
        </div>
    </div>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // ==================== 基础配置 ====================
        const API_URL = 'https://super.pc28998.com/history/JND28?limit=50';
        
        const FORM_RANGES = {
            '小单': [1, 3, 5, 7, 9, 11, 13],
            '小双': [0, 2, 4, 6, 8, 10, 12],
            '大单': [15, 17, 19, 21, 23, 25, 27],
            '大双': [14, 16, 18, 20, 22, 24, 26]
        };
        
        const ALL_GROUPS = ['大双', '大单', '小双', '小单'];
        
        const KILL_GROUP_RULES = {
            '小单': '大双',
            '小双': '大单',
            '大单': '小双',
            '大双': '小单'
        };
        
        let currentData = [];
        
        // ==================== 工具函数 ====================
        function parseNumbers(opencode) {
            if (!opencode) return [0, 0, 0];
            let numStr = String(opencode);
            if (numStr.includes(',')) return numStr.split(',').map(s => parseInt(s.trim()) || 0);
            if (numStr.includes(' ')) return numStr.split(' ').map(s => parseInt(s.trim()) || 0);
            if (numStr.length === 3) return [parseInt(numStr[0]), parseInt(numStr[1]), parseInt(numStr[2])];
            return [0, 0, 0];
        }
        
        function getGroupBySum(total) {
            if (total < 1 || total > 27) return '未知';
            const size = total <= 13 ? '小' : '大';
            const parity = total % 2 === 1 ? '单' : '双';
            return size + parity;
        }
        
        function getKillGroupByGroup(group) {
            return KILL_GROUP_RULES[group] || '未知';
        }
        
        function isExtremeNumber(num) {
            return (num >= 0 && num <= 4) || (num >= 24 && num <= 27);
        }
        
        function isSafeNumber(num) {
            return num >= 5 && num <= 23;
        }
        
        // ==================== 核心算法 ====================
        function calculatePrediction(data) {
            if (!data || data.length < 3) return null;
            
            const recent = data.slice(0, 3);
            const recentSums = recent.map(r => {
                const nums = parseNumbers(r.opencode);
                return nums.reduce((a, b) => a + b, 0);
            });
            const recentGroups = recentSums.map(s => getGroupBySum(s));
            
            const groupCounts = {};
            ALL_GROUPS.forEach(g => groupCounts[g] = 0);
            recentGroups.forEach(g => { if (groupCounts.hasOwnProperty(g)) groupCounts[g]++; });
            
            let killGroup;
            if (new Set(recentGroups).size === 1) {
                killGroup = getKillGroupByGroup(recentGroups[0]);
            } else {
                let minCount = Math.min(...Object.values(groupCounts));
                let candidates = ALL_GROUPS.filter(g => groupCounts[g] === minCount);
                if (candidates.length > 1) {
                    candidates.sort((a, b) => recentGroups.lastIndexOf(b) - recentGroups.lastIndexOf(a));
                }
                killGroup = candidates[0];
            }
            
            const recommendGroups = ALL_GROUPS.filter(g => g !== killGroup);
            
            const groupCodes = {};
            const usedCodes = new Set();
            const allCodes = [];
            
            recommendGroups.forEach((group, groupIdx) => {
                const library = FORM_RANGES[group] || [];
                let available = library.filter(num => !isExtremeNumber(num));
                
                if (available.length < 2) {
                    for (let num = 5; num <= 23; num++) {
                        if (!available.includes(num) && !isExtremeNumber(num)) {
                            available.push(num);
                        }
                    }
                }
                
                available.sort((a, b) => Math.abs(a - 13.5) - Math.abs(b - 13.5));
                
                const codes = [];
                for (let i = 0; i < 2; i++) {
                    let code = null;
                    let attempts = 0;
                    
                    while (attempts < 50) {
                        attempts++;
                        if (available.length > 0) {
                            if (Math.random() < 0.8 && available.length >= 2) {
                                const topCount = Math.max(1, Math.floor(available.length / 2));
                                code = available[Math.floor(Math.random() * topCount)];
                            } else {
                                code = available[Math.floor(Math.random() * available.length)];
                            }
                        } else {
                            code = Math.floor(Math.random() * 18) + 5;
                        }
                        if (!usedCodes.has(code)) break;
                    }
                    
                    if (code === null || usedCodes.has(code)) {
                        for (let num = 5; num <= 23; num++) {
                            if (!usedCodes.has(num) && !isExtremeNumber(num)) {
                                code = num;
                                break;
                            }
                        }
                    }
                    
                    usedCodes.add(code);
                    codes.push(code);
                    allCodes.push(code);
                }
                
                groupCodes[group] = codes;
            });
            
            return {
                killGroup,
                recommendGroups,
                groupCodes,
                allCodes,
                recentSums,
                recentGroups,
                groupCounts,
                period: data[0]?.expect || '---'
            };
        }
        
        // ==================== 命中率分析 ====================
        function analyzeHitRate(data) {
            if (!data || data.length < 21) return null;
            
            const history = [];
            let killHits = 0;
            let codeHits = 0;
            
            for (let i = 1; i <= 20; i++) {
                if (i + 3 > data.length) break;
                
                const trainData = data.slice(i, i + 3);
                const actualRecord = data[i - 1];
                const actualNums = parseNumbers(actualRecord.opencode);
                const actualSum = actualNums.reduce((a, b) => a + b, 0);
                const actualGroup = getGroupBySum(actualSum);
                
                const prediction = calculatePrediction(trainData);
                if (!prediction) continue;
                
                const killHit = prediction.killGroup !== actualGroup;
                const codeHit = prediction.allCodes.includes(actualSum);
                
                if (killHit) killHits++;
                if (codeHit) codeHits++;
                
                history.push({
                    period: actualRecord.expect,
                    actual: `${actualSum}[${actualGroup}]`,
                    killGroup: prediction.killGroup,
                    killHit: killHit,
                    codes: prediction.allCodes.join(','),
                    codeHit: codeHit
                });
            }
            
            const total = history.length;
            const killRate = total > 0 ? Math.round((killHits / total) * 100) : 0;
            const codeRate = total > 0 ? Math.round((codeHits / total) * 100) : 0;
            
            return {
                history,
                total,
                killHits,
                codeHits,
                killRate,
                codeRate,
                totalScore: Math.round((killRate + codeRate) / 2)
            };
        }
        
        // ==================== UI更新函数 ====================
        function updateUI(data) {
            if (!data || data.length === 0) return;
            
            const latest = data[0];
            const latestNums = parseNumbers(latest.opencode);
            const latestSum = latestNums.reduce((a, b) => a + b, 0);
            
            document.getElementById('latestNumbers').innerHTML = `
                <div class="ball">${latestNums[0]}</div>
                <span class="plus">+</span>
                <div class="ball">${latestNums[1]}</div>
                <span class="plus">+</span>
                <div class="ball">${latestNums[2]}</div>
                <span class="equal">=</span>
                <div class="sum-ball">${latestSum}</div>
            `;
            
            document.getElementById('latestInfo').innerHTML = `
                <span>期号 <strong>${latest.expect}</strong></span>
            `;
            
            let historyHtml = '';
            data.slice(0, 10).forEach(item => {
                const nums = parseNumbers(item.opencode);
                const sum = nums.reduce((a, b) => a + b, 0);
                const group = getGroupBySum(sum);
                
                historyHtml += `
                    <tr>
                        <td>${item.expect}</td>
                        <td>
                            <span class="small-ball">${nums[0]}</span>
                            <span class="small-ball">${nums[1]}</span>
                            <span class="small-ball">${nums[2]}</span>
                        </td>
                        <td><strong>${sum}</strong></td>
                        <td style="color: ${group.includes('大') ? '#ff6b4a' : '#2ecc71'}">${group}</td>
                    </tr>
                `;
            });
            document.getElementById('historyBody').innerHTML = historyHtml;
            
            document.getElementById('totalCount').textContent = data.length;
            document.getElementById('latestExpect').textContent = data[0].expect;
            
            if (data.length >= 3) {
                updateRecentPeriods(data.slice(0, 3));
            }
            
            const prediction = calculatePrediction(data);
            if (prediction) {
                displayPrediction(prediction);
            }
        }
        
        function updateRecentPeriods(recent) {
            const container = document.getElementById('recentPeriods');
            let html = '';
            
            recent.forEach((item, index) => {
                const nums = parseNumbers(item.opencode);
                const sum = nums.reduce((a, b) => a + b, 0);
                const group = getGroupBySum(sum);
                
                html += `
                    <div class="recent-item">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <span style="color: #88e0d8;">第${index+1}期</span>
                            <span style="color: #666; font-size:0.8rem;">${item.expect}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <span class="small-ball">${nums[0]}</span>
                                <span class="small-ball">${nums[1]}</span>
                                <span class="small-ball">${nums[2]}</span>
                            </div>
                            <div style="font-weight: bold;">
                                = ${sum} [<span style="color: ${group.includes('大') ? '#ff6b4a' : '#2ecc71'}">${group}</span>]
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            const sums = recent.map(item => {
                const nums = parseNumbers(item.opencode);
                return nums.reduce((a, b) => a + b, 0);
            });
            const groups = sums.map(s => getGroupBySum(s));
            
            const groupCounts = {};
            ALL_GROUPS.forEach(g => groupCounts[g] = 0);
            groups.forEach(g => { if (groupCounts.hasOwnProperty(g)) groupCounts[g]++; });
            
            let statsHtml = '';
            ALL_GROUPS.forEach(group => {
                const count = groupCounts[group] || 0;
                const percentage = (count / 3 * 100).toFixed(0);
                statsHtml += `
                    <div style="margin: 8px 0;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 3px;">
                            <span style="color: #a0b0d0; font-size:0.85rem;">${group}</span>
                            <span style="color: #00e0d0;">${count}次</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${percentage}%;">
                                ${percentage}%
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('groupStats').innerHTML = statsHtml;
        }
        
        function displayPrediction(prediction) {
            document.getElementById('resultPanel').style.display = 'block';
            document.getElementById('predictPeriod').textContent = prediction.period;
            document.getElementById('killGroup').textContent = prediction.killGroup;
            
            const groupsHtml = prediction.recommendGroups.map(g => 
                `<div class="group-tag">${g}</div>`
            ).join('');
            document.getElementById('recommendGroups').innerHTML = groupsHtml;
            
            const groups = prediction.recommendGroups;
            const codesTable = `
                <thead>
                    <tr>
                        <th>${groups[0]}</th>
                        <th>${groups[1]}</th>
                        <th>${groups[2]}</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <div class="code-cell">
                                ${prediction.groupCodes[groups[0]].map(code => 
                                    `<div class="code-badge ${isExtremeNumber(code) ? 'extreme' : 'safe'}">${code}</div>`
                                ).join('')}
                            </div>
                        </td>
                        <td>
                            <div class="code-cell">
                                ${prediction.groupCodes[groups[1]].map(code => 
                                    `<div class="code-badge ${isExtremeNumber(code) ? 'extreme' : 'safe'}">${code}</div>`
                                ).join('')}
                            </div>
                        </td>
                        <td>
                            <div class="code-cell">
                                ${prediction.groupCodes[groups[2]].map(code => 
                                    `<div class="code-badge ${isExtremeNumber(code) ? 'extreme' : 'safe'}">${code}</div>`
                                ).join('')}
                            </div>
                        </td>
                    </tr>
                </tbody>
            `;
            document.getElementById('codesTable').innerHTML = codesTable;
            
            const finalBalls = prediction.allCodes.map(code => {
                const type = isExtremeNumber(code) ? 'extreme' : 'safe';
                return `<div class="final-ball ${type}">${code}</div>`;
            }).join('');
            document.getElementById('finalCodes').innerHTML = finalBalls;
            
            const safeCount = prediction.allCodes.filter(c => isSafeNumber(c)).length;
            const extremeCount = prediction.allCodes.filter(c => isExtremeNumber(c)).length;
            const duplicateCount = prediction.allCodes.length - new Set(prediction.allCodes).size;
            
            document.getElementById('codeStats').innerHTML = `
                <span><i class="fas fa-shield-alt"></i> 安全: ${safeCount}</span>
                <span><i class="fas fa-exclamation-triangle"></i> 极端: ${extremeCount}</span>
                <span>${duplicateCount > 0 ? '⚠️ 有重复' : '✅ 无重复'}</span>
            `;
        }
        
        function displayHitAnalysis(data) {
            const analysis = analyzeHitRate(data);
            if (!analysis || analysis.total === 0) {
                alert('需要至少21期数据进行分析');
                return;
            }
            
            document.getElementById('hitPanel').style.display = 'block';
            
            document.getElementById('killHitRate').textContent = `${analysis.killRate}%`;
            document.getElementById('killHitDesc').textContent = `${analysis.killHits}/${analysis.total}`;
            
            document.getElementById('codeHitRate').textContent = `${analysis.codeRate}%`;
            document.getElementById('codeHitDesc').textContent = `${analysis.codeHits}/${analysis.total}`;
            
            document.getElementById('totalScore').textContent = analysis.totalScore;
            
            let hitHtml = '';
            analysis.history.forEach(item => {
                hitHtml += `
                    <tr>
                        <td>${item.period}</td>
                        <td>${item.actual}</td>
                        <td>${item.killGroup}</td>
                        <td><span class="${item.killHit ? 'hit-success' : 'hit-fail'}">${item.killHit ? '✓' : '✗'}</span></td>
                        <td>${item.codes}</td>
                        <td><span class="${item.codeHit ? 'hit-success' : 'hit-fail'}">${item.codeHit ? '✓' : '✗'}</span></td>
                    </tr>
                `;
            });
            
            document.getElementById('hitBody').innerHTML = hitHtml;
        }
        
        // ==================== 数据获取 ====================
        async function fetchData() {
            try {
                document.getElementById('historyBody').innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 20px;">
                            <div class="loading"></div> 加载中...
                        </td>
                    </tr>
                `;
                
                const response = await fetch(`${API_URL}&t=${Date.now()}`);
                const data = await response.json();
                
                if (data.code === 1 && data.data && data.data.length > 0) {
                    currentData = data.data;
                    updateUI(currentData);
                } else {
                    alert('获取数据失败');
                }
            } catch (error) {
                alert('网络错误');
            }
        }
        
        // ==================== 手动输入 ====================
        function showManualInput() {
            const modal = document.getElementById('manualModal');
            const inputFields = document.getElementById('inputFields');
            
            let html = '';
            for (let i = 1; i <= 3; i++) {
                html += `
                    <div class="input-field">
                        <label>第${i}期 (空格分隔):</label>
                        <input type="text" id="period${i}" placeholder="例: 5 8 3">
                    </div>
                `;
            }
            
            inputFields.innerHTML = html;
            modal.style.display = 'flex';
        }
        
        function handleManualSubmit() {
            const inputs = [];
            for (let i = 1; i <= 3; i++) {
                const val = document.getElementById(`period${i}`).value.trim();
                if (!val) {
                    alert(`请输入第${i}期`);
                    return;
                }
                
                const nums = val.split(/\s+/).map(n => parseInt(n));
                if (nums.length !== 3 || nums.some(isNaN)) {
                    alert(`第${i}期格式错误`);
                    return;
                }
                
                inputs.push(nums);
            }
            
            const mockData = inputs.map((nums, idx) => ({
                expect: `手动${idx+1}`,
                opencode: nums.join(','),
                opentime: Date.now(),
                opentime_text: '手动'
            }));
            
            currentData = mockData;
            updateUI(currentData);
            
            document.getElementById('manualModal').style.display = 'none';
        }
        
        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            
            document.getElementById('refreshBtn').addEventListener('click', fetchData);
            document.getElementById('analyzeBtn').addEventListener('click', () => {
                if (currentData.length > 0) displayHitAnalysis(currentData);
                else alert('请先加载数据');
            });
            document.getElementById('manualBtn').addEventListener('click', showManualInput);
            document.getElementById('submitManual').addEventListener('click', handleManualSubmit);
            document.getElementById('closeManual').addEventListener('click', () => {
                document.getElementById('manualModal').style.display = 'none';
            });
            
            document.getElementById('manualModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('manualModal')) {
                    e.target.style.display = 'none';
                }
            });
        });
    </script>
