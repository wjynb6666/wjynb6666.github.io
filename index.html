
<!DOCTYPE html>

        <!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>至尊 全能算法预测</title>
<style>
:root{--bg:#f7f9fc;--card:#ffffff;--text:#1f2937;--muted:#6b7280;--primary:#2563eb;--primary-weak:#e6efff;--border:#e5e7eb;--success:#16a34a;--danger:#ef4444;--accent:#7c3aed;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;touch-action:pan-y;-webkit-user-select:none;user-select:none;}
.container{max-width:980px;margin:0 auto;padding:0;}
.card{background:var(--card);border:1px solid var(--border);border-radius:0;box-shadow:0 8px 20px rgb(16 24 40 / 6%);padding:16px;margin-bottom:1px;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.logo{font-weight:700;font-size:18px;color:var(--primary);}
.current{display:grid;grid-template-columns:1fr;gap:8px;text-align:center;}
.current .period{font-weight:700;font-size:20px}
.current .nums{font-size:24px;font-weight:700}
.current .badge{display:inline-block;background:var(--primary-weak);color:var(--primary);padding:4px 12px;border-radius:999px;font-weight:700;margin-left:8px;font-size:16px;}
.current .opentime{font-size:16px;color:var(--muted);}
.countdown{margin-top:4px;font-size:16px;color:var(--muted)}
.countdown.highlight{color:var(--danger);font-weight:700}
.ai-title{font-weight:700;margin-bottom:12px;font-size:18px;display:flex;align-items:center;gap:8px;}
.ai-title::before{content:'';display:block;width:4px;height:18px;background:var(--primary);border-radius:2px;}
.ai-line{display:flex;flex-direction:column;gap:12px;}
.pill-group{display:flex;flex-wrap:wrap;gap:8px;}
.ai-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;border:1px solid var(--border);font-weight:600;background:#f9fafb;font-size:15px;}
.ai-pill.warn{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
.ai-pill.danger{background:#fef2f2;border-color:#fecaca;color:#991b1b}
.ai-pill.success{background:#ecfdf5;border-color:#bbf7d0;color:#065f46}
.ai-pill.accent{background:#f5f3ff;border-color:#ddd6fe;color:#5b21b6}
.prediction-table{margin-top:16px;width:100%;border-collapse:collapse;font-size:14px;}
.prediction-table th{background:var(--primary-weak);color:var(--primary);padding:10px 8px;text-align:center;font-weight:600;border:1px solid var(--border);}
.prediction-table td{padding:8px 6px;text-align:center;border:1px solid var(--border);}
.prediction-table .correct{color:var(--success);font-weight:600;}
.prediction-table .wrong{color:var(--danger);font-weight:600;}
.stats{margin-top:12px;padding:10px;background:var(--primary-weak);border-radius:8px;text-align:center;font-weight:600;color:var(--primary);font-size:15px;}
.algorithm-selector{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.algorithm-btn{padding:10px 4px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;font-weight:500;font-size:13px;flex:1;text-align:center;}
.algorithm-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
.monitor-section{margin-top:16px;padding:12px;background:var(--primary-weak);border-radius:8px;margin-bottom:16px;}
.monitor-title{font-weight:700;margin-bottom:8px;color:var(--primary);font-size:15px;}
.monitor-content{font-size:13px;line-height:1.6;color:var(--text);}
.code-box{background:#f1f5f9;padding:10px;border-radius:8px;border:1px dashed var(--border);margin-top:8px;}
.code-title{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:700;}
.code-list{display:flex;flex-wrap:wrap;gap:6px;font-family:monospace;font-weight:700;color:var(--accent);font-size:16px;}
@media (max-width:768px){.algorithm-btn{font-size:11px;}}
</style>
</head>
<body>
<div class="container">
<div id="error" class="error" style="display:none;padding:15px;color:red;text-align:center;"></div>
<div class="card">
<div class="header"><div class="logo">🧠 至尊 预测算法</div></div>
<div class="current">
<div class="period">最新：<span id="cur-period">--</span> 期</div>
<div class="nums"><span id="cur-nums">--+--+--=--</span><span id="cur-tag" class="badge">-- --</span></div>
<div class="opentime">开奖时间：<span id="cur-time">-- --:--:--</span></div>
<div id="cd" class="countdown" style="display:none;">下一期：<span id="cd-txt">--分--秒</span></div>
</div>
</div>
<div id="ai" class="ai card" style="display:none;">
<div class="algorithm-selector">
<button class="algorithm-btn active" data-algorithm="no-duplicate">避重复</button>
<button class="algorithm-btn" data-algorithm="calculated">计算版</button>
<button class="algorithm-btn" data-algorithm="three-y-kill">3y杀组</button>
<button class="algorithm-btn" data-algorithm="five-y-kill">5y杀组</button>
<button class="algorithm-btn" data-algorithm="kill-tail">杀尾</button>
</div>
<div class="monitor-section">
<div class="monitor-title">📊 算法实时监控</div>
<div id="highest-winrate" class="monitor-content">胜率最高：--</div>
<div id="most-consecutive" class="monitor-content">连中最长：--</div>
</div>
<div class="ai-title">当前算法预测结果</div>
<div class="ai-line">
<div class="pill-group">
<span id="ai-nextperiod" class="ai-pill warn">下一期：--</span>
<span id="ai-kill-combo" class="ai-pill danger">杀组：--</span>
</div>
<div class="pill-group" id="rec-combos">
</div>
<div class="code-box">
<div class="code-title">🎯 推荐特码 (优先5–23安全数字)</div>
<div id="ai-special-codes" class="code-list">-- -- -- -- -- --</div>
</div>
</div>
</div>
<div class="card" id="prediction-table-card" style="display:none;">
<div id="stats" class="stats"></div>
<table class="prediction-table">
<thead><tr><th>期号</th><th>开奖</th><th>推荐组合</th><th>杀组</th><th>结果</th></tr></thead>
<tbody id="prediction-tbody"></tbody>
</table>
</div>
</div>

<script>
// --- 基础配置 ---
const fieldConfig={periodField:'expect',numbersField:'opencode',timeField:'opentime',separator:',',apiUrl:'https://super.pc28998.com/history/JND28?limit=100'};
let data=[],timer=null,isFetching=false;
let currentAlgorithm='no-duplicate';
let algorithmStats={};

// --- 核心定义 ---
const COMBOS = ['小单', '小双', '大单', '大双'];
const COMBO_MAP = { '小单':'大双', '小双':'大单', '大单':'小双', '大双':'小单' };
const COMBO_NUMS = {
    '小单': [5,7,9,11,13],
    '小双': [6,8,10,12],
    '大单': [15,17,19,21,23],
    '大双': [14,16,18,20,22]
};
const THREE_Y = {
    y0: [0,3,6,9,12,15,18,21,24,27],
    y1: [1,4,7,10,13,16,19,22,25],
    y2: [2,5,8,11,14,17,20,23,26]
};
const FIVE_Y = {
    y0: [20,15,25,5,10],
    y1: [1,11,21,6,16,26],
    y2: [2,12,22,7,17,27],
    y3: [13,23,3,8,18],
    y4: [14,24,4,19,9]
};
const KILL_TAIL_TABLE = {
    0:[1,3,4,8], 1:[0,2,4,9], 2:[3,5,6,8], 3:[0,2,6,7], 4:[0,1,2,5],
    5:[0,1,4,9], 6:[0,1,2,4], 7:[1,2,3,4], 8:[0,1,3,4], 9:[0,2,3,4]
};

// --- 初始化 ---
document.addEventListener('DOMContentLoaded', () => {
    setupAlgorithmSelector();
    fetchData();
});

function setupAlgorithmSelector(){
    document.querySelectorAll('.algorithm-btn').forEach(btn => {
        btn.addEventListener('click', function(){
            document.querySelectorAll('.algorithm-btn').forEach(b=>b.classList.remove('active'));
            this.classList.add('active');
            currentAlgorithm = this.getAttribute('data-algorithm');
            renderAll();
        });
    });
}

// --- 算法逻辑 ---

function getCombo(sum) {
    if(sum <= 13) return sum % 2 === 0 ? '小双' : '小单';
    return sum % 2 === 0 ? '大双' : '大单';
}

function generateSpecialCodes(recommendedCombos, killTails = []) {
    let codes = [];
    recommendedCombos.forEach(c => {
        let pool = COMBO_NUMS[c].filter(n => !killTails.includes(n % 10));
        // 每个组合选2个
        let selected = pool.slice(0, 2);
        codes.push(...selected);
    });
    return [...new Set(codes)].slice(0, 6);
}

// 1. 避重复
function algoNoDuplicate(history) {
    if(history.length < 3) return null;
    const [p1, p2, p3] = history.slice(0, 3);
    const v1 = parseInt(`${p3.nums[2]}${p2.nums[1]}${p1.nums[0]}`);
    const v2 = parseInt(`${p3.nums[0]}${p2.nums[1]}${p1.nums[2]}`);
    const v3 = parseInt(`${p3.nums[1]}${p2.nums[1]}${p1.nums[1]}`);
    const total = Math.floor((v1 + v2 + v3) / 3);
    const digitSum = String(total).split('').reduce((a, b) => a + parseInt(b), 0);
    const res = getCombo(digitSum % 27);
    const kill = COMBO_MAP[res];
    const recs = COMBOS.filter(c => c !== kill);
    return { kill, recs, codes: generateSpecialCodes(recs) };
}

// 2. 计算版
function algoCalculated(history) {
    if(history.length < 3) return null;
    let counts = { '小单':0, '小双':0, '大单':0, '大双':0 };
    history.slice(0,3).forEach(item => {
        counts[getCombo(item.nums.reduce((a,b)=>a+b,0))]++;
    });
    let kill = Object.keys(counts).reduce((a, b) => counts[a] <= counts[b] ? a : b);
    const recs = COMBOS.filter(c => c !== kill);
    return { kill, recs, codes: generateSpecialCodes(recs) };
}

// 3. 3y杀组
function algo3Y(history) {
    const latestSum = history[0].nums.reduce((a,b)=>a+b,0);
    const yKey = latestSum % 3;
    const historyMatch = history.slice(1).find(h => (h.nums.reduce((a,b)=>a+b,0) % 3) === yKey);
    if(!historyMatch) return null;
    let calc = (latestSum + historyMatch.nums.reduce((a,b)=>a+b,0));
    while(calc >= 28) calc -= 27;
    const isSameY = (calc % 3) === yKey;
    const kill = isSameY ? getCombo(calc) : COMBO_MAP[getCombo(calc)];
    const recs = COMBOS.filter(c => c !== kill);
    return { kill, recs, codes: generateSpecialCodes(recs) };
}

// 4. 5y杀组
function algo5Y(history) {
    const latestSum = history[0].nums.reduce((a,b)=>a+b,0);
    let yKey = -1;
    for(let k in FIVE_Y) if(FIVE_Y[k].includes(latestSum)) yKey = parseInt(k.replace('y',''));
    if(yKey === -1) yKey = latestSum % 5;

    const historyMatch = history.slice(1).find(h => {
        let hSum = h.nums.reduce((a,b)=>a+b,0);
        return FIVE_Y[`y${yKey}`]?.includes(hSum) || (hSum % 5 === yKey);
    });
    if(!historyMatch) return null;

    let addVal = [0,1,4].includes(yKey) ? historyMatch.nums[0] : (yKey === 2 ? historyMatch.nums[1] : historyMatch.nums[2]);
    let calc = latestSum + addVal;
    const isSameY = (calc % 5) === yKey;
    const kill = isSameY ? getCombo(calc % 28) : COMBO_MAP[getCombo(calc % 28)];
    const recs = COMBOS.filter(c => c !== kill);
    return { kill, recs, codes: generateSpecialCodes(recs) };
}

// 5. 杀尾
function algoKillTail(history) {
    const last = history[0];
    const lSum = last.nums.reduce((a,b)=>a+b,0);
    const refIdx = (lSum % 3) === 2 ? 1 : 0;
    const killTails = KILL_TAIL_TABLE[last.nums[refIdx] % 10];
    
    let safety = {};
    COMBOS.forEach(c => {
        safety[c] = COMBO_NUMS[c].filter(n => !killTails.includes(n % 10)).length;
    });
    let kill = Object.keys(safety).reduce((a, b) => safety[a] <= safety[b] ? a : b);
    const recs = COMBOS.filter(c => c !== kill);
    return { kill, recs, codes: generateSpecialCodes(recs, killTails) };
}

// --- 数据处理与渲染 ---

function runAlgo(id, history) {
    switch(id) {
        case 'no-duplicate': return algoNoDuplicate(history);
        case 'calculated': return algoCalculated(history);
        case 'three-y-kill': return algo3Y(history);
        case 'five-y-kill': return algo5Y(history);
        case 'kill-tail': return algoKillTail(history);
        default: return null;
    }
}

function fetchData(){
    if(isFetching) return;
    isFetching = true;
    fetch(fieldConfig.apiUrl,{cache:'no-store'}).then(r=>r.json()).then(json=>{
        let raw = extractArray(json);
        data = raw.slice(0, 100).map(item=>({
            ...item,
            nums: String(item[fieldConfig.numbersField]).split(fieldConfig.separator).map(n=>parseInt(n))
        }));
        renderAll();
        isFetching = false;
    }).catch(e=>{
        document.getElementById('error').textContent = "数据加载失败: " + e.message;
        isFetching = false;
    });
}

function renderAll() {
    if(!data.length) return;
    renderCurrent();
    renderAIPredict();
    calculateMonitor();
    renderPredictionTable();
}

function renderCurrent(){
    const latest = data[0];
    const s = latest.nums.reduce((a,b)=>a+b,0);
    const t = getCombo(s);
    document.getElementById('cur-period').textContent = latest[fieldConfig.periodField];
    document.getElementById('cur-nums').textContent = `${latest.nums.join('+')}=${s}`;
    document.getElementById('cur-tag').textContent = t;
    document.getElementById('cur-time').textContent = latest[fieldConfig.timeField];
}

function renderAIPredict() {
    const res = runAlgo(currentAlgorithm, data);
    if(!res) return;
    
    document.getElementById('ai-nextperiod').textContent = `下一期：${parseInt(data[0][fieldConfig.periodField])+1}`;
    document.getElementById('ai-kill-combo').textContent = `杀组：${res.kill}`;
    
    const recContainer = document.getElementById('rec-combos');
    recContainer.innerHTML = res.recs.map(c => `<span class="ai-pill success">推荐：${c}</span>`).join('');
    
    document.getElementById('ai-special-codes').textContent = res.codes.join('  ');
    document.getElementById('ai').style.display = 'block';
}

function calculateMonitor() {
    const algos = ['no-duplicate', 'calculated', 'three-y-kill', 'five-y-kill', 'kill-tail'];
    let stats = algos.map(id => {
        let win = 0, total = 0, consec = 0, tempConsec = 0, broken = false;
        for(let i=0; i<40; i++) {
            let hist = data.slice(i+1);
            let pred = runAlgo(id, hist);
            if(!pred) continue;
            total++;
            let actual = getCombo(data[i].nums.reduce((a,b)=>a+b,0));
            if(actual !== pred.kill) {
                win++;
                if(!broken) tempConsec++;
            } else {
                broken = true;
            }
        }
        return { id, rate: (win/total*100).toFixed(1), consec: tempConsec };
    });

    const best = stats.sort((a,b)=>b.rate - a.rate)[0];
    const most = stats.sort((a,b)=>b.consec - a.consec)[0];
    
    document.getElementById('highest-winrate').textContent = `最高胜率算法：${getName(best.id)} (${best.rate}%)`;
    document.getElementById('most-consecutive').textContent = `当前最长连中：${getName(most.id)} (${most.consec}期)`;
}

function getName(id) {
    const names = {'no-duplicate':'避重复','calculated':'计算版','three-y-kill':'3y杀组','five-y-kill':'5y杀组','kill-tail':'杀尾'};
    return names[id];
}

function renderPredictionTable() {
    const tbody = document.getElementById('prediction-tbody');
    tbody.innerHTML = '';
    let win=0, total=0;

    for(let i=0; i<30; i++) {
        let hist = data.slice(i+1);
        let pred = runAlgo(currentAlgorithm, hist);
        if(!pred) continue;
        
        total++;
        let actualSum = data[i].nums.reduce((a,b)=>a+b,0);
        let actualCombo = getCombo(actualSum);
        let isWin = actualCombo !== pred.kill;
        if(isWin) win++;

        const row = `<tr>
            <td>${data[i][fieldConfig.periodField]}</td>
            <td>${actualSum}(${actualCombo})</td>
            <td>${pred.recs.join(',')}</td>
            <td>${pred.kill}</td>
            <td class="${isWin?'correct':'wrong'}">${isWin?'准':'错'}</td>
        </tr>`;
        tbody.innerHTML += row;
    }
    document.getElementById('stats').textContent = `${getName(currentAlgorithm)} 近${total}期 胜率：${(win/total*100).toFixed(1)}%`;
    document.getElementById('prediction-table-card').style.display = 'block';
}

function extractArray(res){
    if(Array.isArray(res)) return res;
    const keys=['data','items','list','results'];
    for(const k of keys) if(Array.isArray(res[k])) return res[k];
    return [];
}
</script>
